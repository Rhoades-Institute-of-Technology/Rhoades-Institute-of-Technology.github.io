backend:
  name: github
  repo: joffie87/rit-site
  branch: main
  base_url: https://sveltia-cms-auth.rit-ptaa.workers.dev

media_libraries:
  cloudinary:
    config:
      cloud_name: diepkxvif
      api_key: 763915771293399

# ---------------------------------------------------------------------------
# Lens overrides + translations: each page with lens/i18n content now exposes
# "overrides" (per-lens sparse edits) and "translations" (per-language sparse
# edits) so every variant is CMS-editable. Sveltia has no YAML anchors so the
# field shapes are inlined per collection — keep them in sync with the base
# JSON keys if you add new fields.
# ---------------------------------------------------------------------------

collections:
  - name: blog
    label: Blog Posts
    folder: posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}_{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: slug, label: Slug, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: author, label: Author, widget: string, default: "Johnathon Rhoades" }
      - { name: excerpt, label: Excerpt, widget: text }
      - { name: tags, label: Tags, widget: list, field: { name: tag, widget: string } }
      - { name: featured_image, label: Featured Image, widget: image }
      - { name: featured, label: Featured Post, widget: boolean, default: false, required: false, hint: "Pin to top of blog list" }
      - { name: status, label: Status, widget: select, options: ["draft", "published"], default: "published", required: false }
      - { name: series, label: Series / Collection (optional), widget: string, required: false, hint: "Group related posts, e.g. 'Founding RIT'" }
      - { name: canonical_url, label: Canonical URL (optional), widget: string, required: false, hint: "If this post is crossposted, point to the canonical location" }
      - name: related
        label: Related Posts (optional)
        widget: list
        required: false
        hint: "Slugs of related posts to link at the bottom"
        field: { name: slug, widget: string }
      - name: translations
        label: Translations (optional)
        widget: object
        required: false
        collapsed: true
        hint: "Translated title/excerpt/body per language. Body format matches base."
        fields:
          - name: es
            label: Spanish (es)
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: Title, widget: string, required: false }
              - { name: excerpt, label: Excerpt, widget: text, required: false }
              - { name: body, label: Body, widget: markdown, required: false }
          - name: hmn
            label: Hmong (hmn)
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: Title, widget: string, required: false }
              - { name: excerpt, label: Excerpt, widget: text, required: false }
              - { name: body, label: Body, widget: markdown, required: false }
          - name: ar
            label: Arabic (ar)
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: Title, widget: string, required: false }
              - { name: excerpt, label: Excerpt, widget: text, required: false }
              - { name: body, label: Body, widget: markdown, required: false }
          - name: de
            label: German (de)
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: Title, widget: string, required: false }
              - { name: excerpt, label: Excerpt, widget: text, required: false }
              - { name: body, label: Body, widget: markdown, required: false }
          - name: pl
            label: Polish (pl)
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: title, label: Title, widget: string, required: false }
              - { name: excerpt, label: Excerpt, widget: text, required: false }
              - { name: body, label: Body, widget: markdown, required: false }
      - { name: body, label: Body, widget: markdown }

