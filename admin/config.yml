backend:
  name: github
  repo: joffie87/rit-site
  branch: main
  base_url: https://sveltia-cms-auth.rit-ptaa.workers.dev

media_libraries:
  cloudinary:
    config:
      cloud_name: diepkxvif
      api_key: 763915771293399

collections:
  - name: blog
    label: Blog Posts
    folder: posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}_{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: slug, label: Slug, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: author, label: Author, widget: string, default: "Johnathon Rhoades" }
      - { name: excerpt, label: Excerpt, widget: text }
      - { name: tags, label: Tags, widget: list, field: { name: tag, widget: string } }
      - { name: featured_image, label: Featured Image, widget: image }
      - { name: body, label: Body, widget: markdown }

  - name: tvn-blog
    label: TVN Blog Posts
    folder: tvn-posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}_{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: slug, label: Slug, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: author, label: Author, widget: string, default: "Johnathon Rhoades" }
      - { name: excerpt, label: Excerpt, widget: text }
      - { name: tags, label: Tags, widget: list, field: { name: tag, widget: string } }
      - { name: featured_image, label: Featured Image, widget: image }
      - { name: body, label: Body, widget: markdown }

  - name: pages
    label: Page Content
    files:
      - name: hero
        label: Homepage Hero
        file: src/lib/data/hero.json
        fields:
          - { name: tagline, label: Tagline, widget: string }
          - { name: supporting, label: Supporting Text, widget: text }
          - { name: cta_text, label: CTA Button Text, widget: string }
          - { name: cta_href, label: CTA Button Link, widget: string }

      - name: about
        label: About Page
        file: src/lib/data/about.json
        fields:
          - { name: narrative, label: Narrative, widget: text }
          - { name: founder_story, label: Founder Story, widget: text }
          - { name: codex, label: Codex Description, widget: text }
          - name: values
            label: Core Values
            widget: list
            fields:
              - { name: name, label: Value Name, widget: string }
              - { name: description, label: Description, widget: text }
          - { name: nonprofit_info, label: Nonprofit Info, widget: text }

      - name: community
        label: Community Page
        file: src/lib/data/community.json
        fields:
          - { name: concept, label: Concept, widget: text }
          - { name: gamers_origin, label: Gamers Origin, widget: text }
          - { name: how_it_works, label: How It Works, widget: text }
          - { name: gamesgiving, label: Gamesgiving, widget: text }
          - { name: invitation, label: Invitation, widget: text }

      - name: donate
        label: Donate Page
        file: src/lib/data/donate.json
        fields:
          - { name: impact, label: Impact Statement, widget: text }
          - { name: what_funds, label: What Your Donation Funds, widget: text }
          - name: tiers
            label: Donation Tiers
            widget: list
            fields:
              - { name: amount, label: Amount ($), widget: number, value_type: int }
              - { name: label, label: Tier Label, widget: string }
              - { name: url, label: Stripe Payment Link, widget: string }
          - { name: disclosure, label: Tax Disclosure, widget: text }
          - { name: ein, label: EIN, widget: string }
          - { name: ein_note, label: EIN Note, widget: string, required: false, hint: "e.g. 'pending IRS determination' — leave blank once confirmed" }

      - name: contact
        label: Contact Page
        file: src/lib/data/contact.json
        fields:
          - { name: intro, label: Intro Text, widget: text }
          - { name: direct_info, label: Direct Contact Info, widget: text }

  - name: projects
    label: Projects
    file: src/lib/data/projects.json
    files:
      - name: projects
        label: Project List
        file: src/lib/data/projects.json
        fields:
          - name: projects
            label: Projects
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: description, label: Description, widget: text }
              - name: tags
                label: Tags
                widget: list
                field: { name: tag, widget: string }
              - { name: status, label: Status, widget: select, options: ["Active", "In Development", "Prototype", "Concept", "Draft Framework", "Patent Pending"] }

  - name: settings
    label: Site Settings
    files:
      - name: artists
        label: Artists
        file: src/lib/data/artists.json
        fields:
          - name: artists
            label: Artists
            widget: list
            fields:
              - { name: slug, label: Slug, widget: string }
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: avatar, label: Avatar, widget: image, required: false }
              - name: links
                label: Links
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: url, label: URL, widget: string }
              - name: gallery
                label: Gallery
                widget: list
                fields:
                  - { name: src, label: Image, widget: image }
                  - { name: alt, label: Alt Text, widget: string }
                  - { name: caption, label: Caption, widget: string, required: false }

      - name: hub
        label: Hub Settings
        file: src/lib/data/hub-config.json
        fields:
          - { name: about, label: Hub About Text, widget: text }
          - { name: logo, label: Hub Logo, widget: image, hint: "Cloudinary public ID or full URL" }
          - { name: logo_size, label: Hub Logo Height (px), widget: string, default: "96", hint: "Height in pixels e.g. 64, 96, 128. Width scales automatically." }
          - { name: discord_url, label: Discord Invite URL, widget: string }
          - { name: discord_logo, label: Discord Logo, widget: image, required: false, hint: "Upload your custom Discord logo" }
          - { name: discord_logo_size, label: Discord Logo Height (px), widget: string, default: "192", required: false, hint: "Height in pixels e.g. 128, 192, 256. Width scales automatically." }
          - name: projects
            label: Hub Projects
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: url, label: URL, widget: string }
              - name: tags
                label: Tags
                widget: list
                field: { name: tag, widget: string }

      - name: resources
        label: Resources / Downloads
        file: src/lib/data/resources.json
        fields:
          - { name: intro, label: Page Intro, widget: text }
          - name: categories
            label: Categories
            widget: list
            fields:
              - { name: name, label: Category Name, widget: string }
              - name: items
                label: Items
                widget: list
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: file_url, label: Download URL, widget: string, required: false, hint: "Cloudinary URL for the file" }
                  - { name: thumbnail, label: Thumbnail, widget: image, required: false }
                  - { name: file_type, label: File Type, widget: string, default: "PDF", hint: "PDF, PNG, ZIP, etc." }

      - name: team
        label: Team & Governance
        file: src/lib/data/team.json
        fields:
          - { name: intro, label: Page Intro, widget: text }
          - name: leadership
            label: Leadership
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: bio, label: Bio, widget: text }
              - { name: linkedin, label: LinkedIn URL, widget: string, required: false }
              - { name: avatar, label: Avatar, widget: image, required: false }
          - name: board_positions
            label: Board Positions
            widget: list
            fields:
              - { name: role, label: Role, widget: string }
              - { name: expertise, label: Expertise Sought, widget: string }
          - name: volunteer_roles
            label: Volunteer Roles
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
          - name: governance_policies
            label: Governance Policies
            widget: list
            fields:
              - { name: name, label: Policy Name, widget: string }
              - { name: status, label: Status, widget: select, options: ["Filed", "Draft", "Adopted"] }

      - name: site-settings
        label: Site-Wide Settings
        file: src/lib/data/site-settings.json
        fields:
          - { name: navbar_logo, label: Navbar Logo, widget: image, hint: "Cloudinary public ID or full URL" }
          - { name: navbar_logo_size, label: Navbar Logo Height (px), widget: string, default: "56", hint: "Height in pixels e.g. 40, 56, 64. Width scales automatically." }
          - { name: hub_logo, label: Hub Logo, widget: image, hint: "Small logo for the hub page" }
          - { name: og_image, label: OG Image, widget: image, hint: "Default social sharing image" }
          - { name: tvn_logo, label: TVN Logo, widget: image, required: false, hint: "Leave empty to show text — add image when logo is ready" }
          - { name: tvn_logo_size, label: TVN Logo Height (px), widget: string, default: "40", required: false, hint: "Height in pixels e.g. 32, 40, 48. Width scales automatically." }
