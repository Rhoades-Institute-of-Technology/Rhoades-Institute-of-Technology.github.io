<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | RIT</title>
  <style>
    /* Force Cloudinary media library modal to near-fullscreen */
    [class*="media-library"],
    .cloudinary-widget,
    [role="dialog"]:has(iframe) {
      width: 95vw !important;
      height: 90vh !important;
      max-width: 95vw !important;
      max-height: 90vh !important;
      position: fixed !important;
      top: 5vh !important;
      left: 2.5vw !important;
      z-index: 999999 !important;
    }

    /* Make iframe fill the modal */
    [class*="media-library"] iframe,
    .cloudinary-widget iframe,
    [role="dialog"] iframe {
      width: 100% !important;
      height: 100% !important;
      min-width: 100% !important;
      min-height: 100% !important;
      border: none !important;
    }

    /* Sveltia dialog containers */
    [class*="dialog"],
    [class*="Dialog"],
    dialog {
      max-width: 95vw !important;
      max-height: 90vh !important;
      overflow: auto !important;
    }

    /* Z-index stack */
    [role="dialog"],
    [class*="modal"],
    [class*="overlay"],
    dialog[open] {
      z-index: 999999 !important;
    }

    [class*="backdrop"],
    dialog::backdrop {
      z-index: 999998 !important;
    }

    /* Fix button click targets */
    button, [role="button"], a[href] {
      position: relative;
      z-index: 1;
      cursor: pointer;
    }

    /* Back button — bigger click area */
    [class*="back"] button,
    button[class*="back"],
    nav button,
    [class*="toolbar"] button {
      z-index: 10 !important;
      min-height: 44px;
      min-width: 44px;
      padding: 8px !important;
    }

    /* Ultrawide layout */
    @media (min-width: 1920px) {
      [class*="editor"],
      [class*="preview"],
      [class*="content"] {
        max-width: none !important;
      }
    }

    /* Prevent hidden overflow cutting off modals */
    main, [class*="main"], [class*="content-area"] {
      overflow: visible !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
