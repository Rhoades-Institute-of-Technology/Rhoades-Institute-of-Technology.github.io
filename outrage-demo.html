<title>OUTRAGE — Community Raid Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0a2e;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: calc(100vh - 44px);
  }

  /* Music transport bar */
  #musicBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(15, 10, 46, 0.92);
    border-top: 1px solid rgba(245, 183, 49, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 100;
    font-family: 'Segoe UI', system-ui, sans-serif;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .music-btn {
    background: none;
    border: 1px solid rgba(245, 183, 49, 0.3);
    border-radius: 6px;
    color: #f5b731;
    font-size: 16px;
    cursor: pointer;
    padding: 6px 10px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .music-btn:hover { background: rgba(245, 183, 49, 0.1); }
  .music-btn:active { background: rgba(245, 183, 49, 0.2); }
  #demoTrackName {
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    max-width: 220px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }
  .music-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.1);
  }
  .music-label {
    font-size: 10px;
    color: rgba(245, 183, 49, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
</style>

}

var _recolorCache = {};

function hexToHSL(hex) {
  var r = parseInt(hex.slice(1,3), 16) / 255;
  var g = parseInt(hex.slice(3,5), 16) / 255;
  var b = parseInt(hex.slice(5,7), 16) / 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    var d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
    else if (max === g) h = ((b - r) / d + 2) * 60;
    else h = ((r - g) / d + 4) * 60;
  }
  return [h, s, l];
}

function hslToRGB(h, s, l) {
  h = ((h % 360) + 360) % 360;
  var c = (1 - Math.abs(2 * l - 1)) * s;
  var x = c * (1 - Math.abs((h / 60) % 2 - 1));
  var m = l - c / 2;
  var r, g, b;
  if (h < 60) { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else { r = c; g = 0; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}

function recolorSprite(sheet, skinTone) {
  if (!skinTone || !sheet.complete || sheet.naturalWidth === 0) return sheet;
  var key = (sheet.src || sheet._recolorId || 'sheet') + '|' + skinTone;
  if (_recolorCache[key]) return _recolorCache[key];
  try {
    var w = sheet.naturalWidth, h = sheet.naturalHeight;
    var offscreen = document.createElement('canvas');
    offscreen.width = w; offscreen.height = h;
    offscreen.naturalWidth = w; offscreen.naturalHeight = h;
    offscreen.complete = true;
    var octx = offscreen.getContext('2d');
    octx.drawImage(sheet, 0, 0);
    var imgData = octx.getImageData(0, 0, w, h);
    var data = imgData.data;
    var target = hexToHSL(skinTone);
    var tH = target[0], tS = target[1], tL = target[2];
    var baseMagentaL = 0.5;
    for (var i = 0; i < data.length; i += 4) {
      if (data[i + 3] < 10) continue;
      var pr = data[i] / 255, pg = data[i+1] / 255, pb = data[i+2] / 255;
      var mx = Math.max(pr, pg, pb), mn = Math.min(pr, pg, pb);
      var pl = (mx + mn) / 2;
      if (mx === mn) continue;
      var d = mx - mn;
      var ps = pl > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
      var ph;
      if (mx === pr) ph = ((pg - pb) / d + (pg < pb ? 6 : 0)) * 60;
      else if (mx === pg) ph = ((pb - pr) / d + 2) * 60;
      else ph = ((pr - pg) / d + 4) * 60;
      if (ph >= 280 && ph <= 320 && ps > 0.25) {
        var lRatio = pl / baseMagentaL;
        var newL = Math.min(0.95, Math.max(0.05, tL * lRatio));
        var rgb = hslToRGB(tH, tS * 0.9, newL);
        data[i] = rgb[0]; data[i+1] = rgb[1]; data[i+2] = rgb[2];
      }
    }
    octx.putImageData(imgData, 0, 0);

  } catch(e) {

function spawnBurst(x, y, color, count, speed, life) {
  for (var i = 0; i < count; i++) {
    var angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    var spd = speed * (0.5 + Math.random() * 0.5);
    spawnParticle(x, y, color, Math.cos(angle)*spd, Math.sin(angle)*spd, life || 0.8, 2 + Math.random()*4);
  }
}

function drawBackground(t) {
  
  var grd = ctx.createRadialGradient(W*0.5, H*0.55, 0, W*0.5, H*0.55, W*0.7);
  grd.addColorStop(0, '#4a1520');
  grd.addColorStop(0.4, '#2d1040');
  grd.addColorStop(1, '#0f0a2e');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  
  ctx.fillStyle = '#0c0820';
  ctx.fillRect(0, H*0.72, W, H*0.28);

  
  ctx.strokeStyle = '#2a1855';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H*0.72);
  ctx.lineTo(W, H*0.72);
  ctx.stroke();

  
  for (var i = 0; i < 18; i++) {
    var px = (Math.sin(t*0.0003 + i*2.1) * 0.5 + 0.5) * W;
    var py = (Math.cos(t*0.0002 + i*1.7) * 0.5 + 0.5) * H * 0.75;
    var sz = 1.5 + Math.sin(i * 3.7) * 1.5;  
    var alpha = 0.12 + Math.sin(t*0.002 + i) * 0.1;
    var flicker = Math.sin(t * 0.005 + i * 4.3);
    
    var r = 245, g = Math.floor(120 + flicker * 46), b = Math.floor(20 + flicker * 15);
    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    ctx.fill();
  }
}

function drawBoss(t, hitOffset) {
  ctx.save();
  var bx = state.bossX;
  var by = state.bossY;
  var scale = gameScale;
  var hit = hitOffset || 0;

  ctx.translate(bx + hit, by);
  ctx.scale(scale, scale);

  
  var lean = state.bossFaceX * 0.04;  
  ctx.rotate(lean);

  
  
  
  
  
  var bbSheet = 'boss-idle-down';
  var bbFrame = (state.bossIdleFrame || 0) % IDLE_SPRITE_FRAMES;
  if (state.bossAction === 'kick') {
    bbSheet = state.bossKickUp ? 'boss-kick-up' : 'boss-kick-down';
    bbFrame = state.bossKickFrame || 0;
  } else if (state.bossAction === 'telegraph_stomp' || state.bossAction === 'stomp') {
    bbSheet = 'boss-jump-down-hop';
    bbFrame = state.bossStompFrame || 0;
  } else if (state.bossMoving) {
    
    if (state.bossMoveDir === 'up') bbSheet = 'boss-walk-up';
    else if (state.bossMoveDir === 'up-diag') bbSheet = 'boss-walk-up-right';
    else if (state.bossMoveDir === 'side') bbSheet = 'boss-walk-right';
    else if (state.bossMoveDir === 'down-diag') bbSheet = 'boss-walk-down-left';
    else bbSheet = 'boss-walk-down-loop';
    bbFrame = state.bossSpriteFrame || 0;
  } else if (state.bossDancing) {
    bbSheet = 'boss-dance-down';
    bbFrame = (state.bossDanceFrame || 0) % DANCE_SPRITE_FRAMES;
  }
  var bbData = getBB(bbSheet, bbFrame);
  
  
  var bossFootYLocal = bbData ? bbData.footY : 360;

  
  
  ctx.save();
  ctx.translate(0, bossFootYLocal);
  ctx.scale(1, 0.3);
  ctx.beginPath();
  ctx.arc(0, 0, 160, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();
  ctx.restore();

  
  if (bossSprite.complete && bossSprite.naturalWidth > 0) {
    
    var activeIdleSprite = state.bossIdleVariant === 1 && bossIdleSprite2.complete && bossIdleSprite2.naturalWidth > 0 ? bossIdleSprite2 : bossIdleSprite;
    var idleReady = activeIdleSprite.complete && activeIdleSprite.naturalWidth > 0;
    var kickSheet = state.bossKickUp ? bossKickUpSprite : bossKickSprite;
    var useKick = state.bossAction === 'kick' && kickSheet.complete && kickSheet.naturalWidth > 0;
    var useStomp = (state.bossAction === 'telegraph_stomp' || state.bossAction === 'stomp') && bossStompSprite.complete && bossStompSprite.naturalWidth > 0;
    var useWalk = !useKick && !useStomp && state.bossMoving;
    var walkUpDiagReady = bossWalkUpSprite.complete && bossWalkUpSprite.naturalWidth > 0;
    var walkBackReady = bossWalkBackSprite.complete && bossWalkBackSprite.naturalWidth > 0;
    var walkSideReady = bossWalkSideSprite.complete && bossWalkSideSprite.naturalWidth > 0;
    var walkDownLeftReady = bossWalkDownLeftSprite.complete && bossWalkDownLeftSprite.naturalWidth > 0;
    var useWalkBack = useWalk && state.bossMoveDir === 'up' && walkBackReady;
    var useWalkUpDiag = useWalk && state.bossMoveDir === 'up-diag' && walkUpDiagReady;
    var useWalkSide = useWalk && state.bossMoveDir === 'side' && walkSideReady;
    var useWalkDownDiag = useWalk && state.bossMoveDir === 'down-diag' && walkDownLeftReady;
    var useDance = !useKick && !useStomp && !useWalk && state.bossDancing && bossDanceSprite.complete && bossDanceSprite.naturalWidth > 0;
    var useIdle = !useKick && !useStomp && !useWalk && !useDance && idleReady;
    
    if (!useKick && !useStomp && !useWalk && !useDance && !useIdle) { ctx.restore(); return; }
    var useDirectional = useWalkBack || useWalkUpDiag || useWalkSide;
    var sheet = useKick ? kickSheet : useStomp ? bossStompSprite : useWalkBack ? bossWalkBackSprite : useWalkUpDiag ? bossWalkUpSprite : useWalkSide ? bossWalkSideSprite : useWalkDownDiag ? bossWalkDownLeftSprite : useWalk ? bossSprite : useDance ? bossDanceSprite : activeIdleSprite;
    var sheetCols = useKick ? KICK_SPRITE_COLS : useStomp ? STOMP_SPRITE_COLS : useWalkDownDiag ? WALKDOWNLEFT_SPRITE_COLS : useDirectional ? WALKUP_SPRITE_COLS : useWalk ? BOSS_SPRITE_COLS : useDance ? DANCE_SPRITE_COLS : IDLE_SPRITE_COLS;
    var sheetRows = useKick ? KICK_SPRITE_ROWS : useStomp ? STOMP_SPRITE_ROWS : useWalkDownDiag ? WALKDOWNLEFT_SPRITE_ROWS : useDirectional ? WALKUP_SPRITE_ROWS : useWalk ? BOSS_SPRITE_ROWS : useDance ? DANCE_SPRITE_ROWS : IDLE_SPRITE_ROWS;
    var walkFrames = useWalkDownDiag ? WALKDOWNLEFT_SPRITE_FRAMES : useDirectional ? WALKUP_SPRITE_FRAMES : BOSS_SPRITE_FRAMES;
    var frame = useKick ? state.bossKickFrame : useStomp ? state.bossStompFrame : useWalk ? (state.bossSpriteFrame % walkFrames) : useDance ? (state.bossDanceFrame % DANCE_SPRITE_FRAMES) : (state.bossIdleFrame % IDLE_SPRITE_FRAMES);

    
    var fw = sheet.naturalWidth / sheetCols;
    var fh = sheet.naturalHeight / sheetRows;

    
    var animScale = useDance ? 1.18 : (useKick && state.bossKickUp) ? 0.82 : 1.0;
    var drawH = 600 * animScale;
    var drawW = drawH * (BOSS_SPRITE_FW / BOSS_SPRITE_FH);
    var spriteOffY = -80 * animScale;

    
    if (state.bossLastSheet && state.bossLastSheet !== sheet) {
      
      state.bossBlendSheet = state.bossLastSheet;
      state.bossBlendFrame = state._lastBossFrame || 0;
      state.bossBlendCols = state._lastBossCols || 4;
      state._lastBlendFw = state._lastFw || fw;
      state._lastBlendFh = state._lastFh || fh;
      state.bossBlendTimer = state.bossBlendDur;
    }
    state.bossLastSheet = sheet;
    state._lastBossFrame = frame;
    state._lastBossCols = sheetCols;
    state._lastFw = fw;
    state._lastFh = fh;

    
    if (state.bossBlendTimer > 0) {
      var blendAlpha = state.bossBlendTimer / state.bossBlendDur;  
      var oldSheet = state.bossBlendSheet;
      if (oldSheet && oldSheet.complete) {
        var oldFw = state._lastBlendFw || fw;
        var oldFh = state._lastBlendFh || fh;
        var oldCol = state.bossBlendFrame % state.bossBlendCols;
        var oldRow = Math.floor(state.bossBlendFrame / state.bossBlendCols);
        var osx = oldCol * oldFw;
        var osy = oldRow * oldFh;
        var oldDrawW = drawH * (oldFw / oldFh);
        ctx.globalAlpha = blendAlpha;
        ctx.drawImage(oldSheet, osx, osy, oldFw, oldFh,
          -oldDrawW / 2, spriteOffY, oldDrawW, drawH);
      }
      
      ctx.globalAlpha = 1 - blendAlpha;
    }

    
    
    var flipX = ((useWalkUpDiag || useWalkSide) && !state.bossMoveRight) || (useWalkDownDiag && state.bossMoveRight);
    if (flipX) ctx.scale(-1, 1);

    
    var col = frame % sheetCols;
    var row = Math.floor(frame / sheetCols);
    var sx = col * fw;
    var sy = row * fh;

    ctx.drawImage(sheet,
      sx, sy, fw, fh,
      -drawW / 2, spriteOffY, drawW, drawH
    );
    ctx.globalAlpha = 1;

    
    ctx.shadowColor = state.hp <= 20 ? '#ff2200' : '#8844cc';
    ctx.shadowBlur = 15 + Math.sin(t * 0.004) * 8;
    ctx.globalAlpha = 0.15;
    ctx.drawImage(sheet,
      sx, sy, fw, fh,
      -drawW / 2, spriteOffY, drawW, drawH
    );
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    
    
    
    
    var waveTime = t * 0.0008;  
    var speakerY = 80;  
    var speakerSpread = 120;  
    var waveCount = 3;
    var waveMaxR = 150;
    var waveColor = state.hp <= 20 ? '#ff4444' : '#cc66ff';

    
    
    var speakers = [];
    if (useWalkSide) {
      
      
      
      speakers.push({ x: 25, y: speakerY - 35, out: 0.2, arc: 0.55 });   
      speakers.push({ x: 30, y: speakerY + 30, out: -0.15, arc: 0.55 }); 
    } else if (useWalkUpDiag) {
      
      speakers.push({ x: speakerSpread * 0.5, y: speakerY - 20, out: -Math.PI * 0.15, arc: 0.5 });
      speakers.push({ x: -speakerSpread * 0.3, y: speakerY + 10, out: Math.PI + Math.PI * 0.15, arc: 0.4 });
    } else if (useWalkDownDiag) {
      
      
      speakers.push({ x: -speakerSpread * 0.5, y: speakerY - 10, out: Math.PI + Math.PI * 0.15, arc: 0.5 });
      speakers.push({ x: speakerSpread * 0.3, y: speakerY + 20, out: -Math.PI * 0.15, arc: 0.4 });
    } else if (useWalkBack) {
      
      speakers.push({ x: speakerSpread * 0.7, y: speakerY - 10, out: -Math.PI * 0.5, arc: 0.45 });
      speakers.push({ x: -speakerSpread * 0.7, y: speakerY - 10, out: -Math.PI * 0.5, arc: 0.45 });
    } else {
      
      speakers.push({ x: speakerSpread, y: speakerY, out: 0, arc: 0.4 });
      speakers.push({ x: -speakerSpread, y: speakerY, out: Math.PI, arc: 0.4 });
    }

    for (var si2 = 0; si2 < speakers.length; si2++) {
      var spk = speakers[si2];
      var spkArc = spk.arc || 0.4;
      for (var wi = 0; wi < waveCount; wi++) {
        var phase = (waveTime + wi * 0.33) % 1.0;
        var r = 15 + phase * waveMaxR;
        var alpha = 0.25 * (1 - phase);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = waveColor;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(spk.x, spk.y, r, spk.out - spkArc * Math.PI, spk.out + spkArc * Math.PI);
        ctx.stroke();
      }
    }

    
    var rayCount = 5;
    var rayInner = 30;
    var rayOuter = 130;
    for (var si3 = 0; si3 < speakers.length; si3++) {
      var spkR = speakers[si3];
      for (var ri = 0; ri < rayCount; ri++) {
        var rayArc = (spkR.arc || 0.4) * Math.PI * 0.9;
        var spread = (ri / (rayCount - 1) - 0.5) * rayArc;
        var angle = spkR.out + spread;
        var shimmer = 0.85 + 0.15 * Math.sin(t * 0.002 + ri * 1.7 + si3);
        var rInner = rayInner + Math.sin(t * 0.001 + ri * 2.3) * 5;
        var rOuter = rayOuter * shimmer;
        ctx.globalAlpha = 0.18 * shimmer;
        ctx.strokeStyle = waveColor;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(spkR.x + Math.cos(angle) * rInner, spkR.y + Math.sin(angle) * rInner);
        ctx.lineTo(spkR.x + Math.cos(angle) * rOuter, spkR.y + Math.sin(angle) * rOuter);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  } else {
    
    roundRect(ctx, -80, -120, 160, 260, 20);
    ctx.fillStyle = '#1a1040';
    ctx.fill();
    ctx.strokeStyle = '#3a2a65';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  ctx.restore();
}

function drawBossNameplate(t) {
  var bx = state.bossX + state.bossLungeX;
  var by = state.bossY + state.bossLungeY;
  var scale = gameScale;

  
  var plateY = by - 45 * scale;
  var plateX = bx;

  var barW = 300 * scale;
  var barH = 20 * scale;
  var nameSize = Math.round(34 * scale);
  if (nameSize < 16) nameSize = 16;
  var subSize = Math.round(14 * scale);
  if (subSize < 9) subSize = 9;

  
  var topY = plateY - barH - 4 * scale - nameSize - 2 * scale - subSize;
  
  var minTop = 8;  
  if (topY < minTop) {
    plateY += (minTop - topY);
  }
  
  plateX = Math.max(barW / 2 + 10, Math.min(W - barW / 2 - 10, plateX));

  ctx.save();
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  
  ctx.font = 'bold ' + nameSize + 'px Impact, Arial Black, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = C.red;
  ctx.strokeStyle = '#0a0520';
  ctx.lineWidth = 3;
  ctx.strokeText('OUTRAGE', plateX, plateY - barH - 4 * scale);
  ctx.fillText('OUTRAGE', plateX, plateY - barH - 4 * scale);

  
  ctx.font = 'bold ' + subSize + 'px Arial, sans-serif';
  ctx.fillStyle = '#ff8866';
  ctx.strokeText('Lv.?? RAID BOSS', plateX, plateY - barH - 4 * scale - nameSize - 2 * scale);
  ctx.fillText('Lv.?? RAID BOSS', plateX, plateY - barH - 4 * scale - nameSize - 2 * scale);

  
  var hpX = plateX - barW / 2;
  var hpY = plateY - barH;

  
  roundRect(ctx, hpX - 2, hpY - 2, barW + 4, barH + 4, 3);
  ctx.fillStyle = '#0a0520';
  ctx.fill();
  ctx.strokeStyle = '#3a2060';
  ctx.lineWidth = 1;
  ctx.stroke();

  
  var fillW = Math.max(0, (state.hp / 100) * barW);
  if (fillW > 0) {
    ctx.save();
    roundRect(ctx, hpX, hpY, barW, barH, 2);
    ctx.clip();

    
    var hpRatio = state.hp / 100;
    var hpColor;
    if (hpRatio > 0.5) hpColor = '#cc2222';
    else if (hpRatio > 0.25) hpColor = '#dd6600';
    else hpColor = '#ee2200';

    ctx.fillStyle = hpColor;
    ctx.fillRect(hpX, hpY, fillW, barH);

    
    var ggrd = ctx.createLinearGradient(0, hpY, 0, hpY + barH);
    ggrd.addColorStop(0, 'rgba(255,255,255,0.25)');
    ggrd.addColorStop(0.4, 'rgba(255,255,255,0)');
    ggrd.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = ggrd;
    ctx.fillRect(hpX, hpY, fillW, barH);

    ctx.restore();
  }

  
  var hpTextSize = Math.round(barH * 0.8);
  if (hpTextSize < 6) hpTextSize = 6;
  ctx.font = 'bold ' + hpTextSize + 'px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText(Math.round(state.hp) + '%', plateX, hpY + barH / 2);
  ctx.fillText(Math.round(state.hp) + '%', plateX, hpY + barH / 2);

  ctx.restore();
}

function drawGear(ctx, x, y, r, teeth, angle, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  var toothH = r * 0.22; 
  ctx.beginPath();
  for (var i = 0; i < teeth; i++) {
    var a1 = (Math.PI*2 / teeth) * i;
    var a2 = a1 + (Math.PI / teeth) * 0.5;
    var a3 = a1 + (Math.PI / teeth);
    var a4 = a3 + (Math.PI / teeth) * 0.5;
    ctx.lineTo(Math.cos(a1) * r, Math.sin(a1) * r);
    ctx.lineTo(Math.cos(a2) * (r+toothH), Math.sin(a2) * (r+toothH));
    ctx.lineTo(Math.cos(a3) * (r+toothH), Math.sin(a3) * (r+toothH));
    ctx.lineTo(Math.cos(a4) * r, Math.sin(a4) * r);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#1a1030';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(0, 0, r*0.25, 0, Math.PI*2);
  ctx.fillStyle = '#0a0520';
  ctx.fill();
  ctx.restore();
}

function drawMegaphone(ctx, x, y, dir, t, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir * (scale||1), scale||1);
  
  ctx.beginPath();
  ctx.moveTo(0, -6);
  ctx.lineTo(35, -16);
  ctx.lineTo(35, 16);
  ctx.lineTo(0, 6);
  ctx.closePath();
  ctx.fillStyle = '#3a2a55';
  ctx.fill();
  ctx.strokeStyle = '#5a4a75';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(35, 0, 4, 18, 0, 0, Math.PI*2);
  ctx.fillStyle = '#2a1a45';
  ctx.fill();
  ctx.stroke();
  
  var pulse = (t * 0.003) % (Math.PI*2);
  var alpha = 0.15 + Math.sin(pulse) * 0.1;
  ctx.strokeStyle = 'rgba(200,150,255,' + alpha + ')';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(42, 0, 8 + Math.sin(pulse)*3, -0.6, 0.6);
  ctx.stroke();
  ctx.restore();
}

function drawHero(ctx, type, x, y, scale, t, attacking, skinTone, heroObj) {
  var s = scale * Math.min(W, H) / 1000;
  
  if (heroObj) {
    var sheet, cols, rows, frames, frame;
    if (heroObj._kickAnim) {
      
      sheet = heroDieSprite; cols = HERO_DIE_COLS; rows = HERO_DIE_ROWS; frames = HERO_DIE_FRAMES;
      frame = Math.min(Math.floor(heroObj.dieFrame), HERO_DIE_FRAMES - 1);
    } else if (heroObj._hitAnim) {
      
      sheet = heroHitSprite; cols = HERO_HIT_COLS; rows = HERO_HIT_ROWS; frames = HERO_HIT_FRAMES;
      frame = Math.min(Math.floor(heroObj._hitFrame), HERO_HIT_FRAMES - 1);
    } else if (heroObj.dead) {
      
      sheet = heroDieSprite; cols = HERO_DIE_COLS; rows = HERO_DIE_ROWS; frames = HERO_DIE_FRAMES;
      frame = Math.min(Math.floor(heroObj.dieFrame), HERO_DIE_FRAMES - 1);
    } else if (heroObj.castAnim) {
      
      if (heroObj.castAnim === 'fireball') {
        sheet = heroFireballSprite; cols = HERO_FIREBALL_COLS; rows = HERO_FIREBALL_ROWS; frames = HERO_FIREBALL_FRAMES;
      } else if (heroObj.castAnim === 'rez') {
        sheet = heroRezSprite; cols = HERO_REZ_COLS; rows = HERO_REZ_ROWS; frames = HERO_REZ_FRAMES;
      } else {
        
        sheet = heroHealMmSprite; cols = HERO_HEALMM_COLS; rows = HERO_HEALMM_ROWS; frames = HERO_HEALMM_FRAMES;
      }
      frame = Math.min(Math.floor(heroObj.castFrame), frames - 1);
    } else if (heroObj.isMoving) {
      
      sheet = heroRunSprite; cols = HERO_RUN_COLS; rows = HERO_RUN_ROWS; frames = HERO_RUN_FRAMES;
      frame = (Math.floor(heroObj.walkCycle) % frames + frames) % frames;
      if (heroObj.walkCycle > frames * 100) heroObj.walkCycle -= frames * 100;
    } else {
      
      sheet = heroIdleSprite; cols = HERO_IDLE_COLS; rows = HERO_IDLE_ROWS; frames = HERO_IDLE_FRAMES;
      frame = Math.floor(heroObj.idleCycle) % frames;
    }
    
    if (!sheet.complete || sheet.naturalWidth === 0) return;
    
    var origSheet = sheet;
    if (skinTone) sheet = recolorSprite(sheet, skinTone);
    ctx.save();
    ctx.globalAlpha = 1;
    ctx.translate(x, y);
    var col = frame % cols;
    var row = Math.floor(frame / cols);
    var fw = origSheet.naturalWidth / cols;
    var fh = origSheet.naturalHeight / rows;
    
    
    var bbKey = null;
    if (origSheet === heroRunSprite) bbKey = 'hero-run-right-v2';
    else if (origSheet === heroIdleSprite) bbKey = 'hero-idle-right';
    else if (origSheet === heroDieSprite) bbKey = 'hero-die-right';
    else if (origSheet === heroFireballSprite) bbKey = 'hero-fireball-right';
    else if (origSheet === heroHealMmSprite) bbKey = 'hero-heal-mm-right';
    else if (origSheet === heroRezSprite) bbKey = 'hero-rez-right';
    else if (origSheet === heroHitSprite) bbKey = 'hero-hit-right';
    
    var bb0 = bbKey ? getBB(bbKey, 0) : null;
    var scaleCorr = 1.0;
    var yAdj = 0;
    if (bb0) {
      
      
      
      var HERO_BB_REF_H = 224; 
      scaleCorr = HERO_BB_REF_H / bb0.h;
      
      
      
      var HERO_BB_REF_FOOTY = 339; 
      yAdj = HERO_BB_REF_FOOTY - bb0.footY;
    } else {
      
      if (origSheet === heroRunSprite) { scaleCorr = 1.40; yAdj = 25; }
      else if (origSheet === heroIdleSprite) scaleCorr = 1.04;
      else if (origSheet === heroFireballSprite) scaleCorr = 1.06;
      else if (origSheet === heroHealMmSprite) { scaleCorr = 1.34; yAdj = 22; }
      else if (origSheet === heroHitSprite) scaleCorr = 1.15;
    }
    var spriteScale = s * 240 / fh * scaleCorr;
    if (!heroObj.facingRight) ctx.scale(-1, 1);
    ctx.scale(spriteScale, spriteScale);
    
    var useFilter = (sheet === origSheet && skinTone);
    if (useFilter) ctx.filter = skinToneFilter(skinTone);
    ctx.drawImage(sheet, col * fw, row * fh, fw, fh, -fw / 2, -fh + 60 + yAdj, fw, fh);
    if (useFilter) ctx.filter = 'none';
    ctx.restore();
    
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.translate(0, -50);
    ctx.scale(1, 0.25);
    ctx.beginPath();
    ctx.arc(0, 0, 50, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.translate(x, y);
  
  var s = scale * Math.min(W,H) / 1000;
  ctx.scale(s, s);

  
  var bob = Math.sin(t * 0.004 + (type === 'tank' ? 0 : type === 'support' ? 2 : 4)) * 3;
  ctx.translate(0, bob);

  var color = C[type] || C.tank;   
  var glowColor = color;
  var skin = skinTone || '#c68c53'; 

  
  ctx.save();
  ctx.translate(0, 80);
  ctx.scale(1, 0.25);
  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();
  ctx.restore();

  
  ctx.fillStyle = '#1a1030';
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = attacking ? 25 : 8;

  
  ctx.beginPath();
  ctx.arc(0, -50, 18, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  
  ctx.shadowBlur = 0;
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(0, -48, 11, 0, Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4, -50, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -50, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-3.5, -50, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.5, -50, 1.2, 0, Math.PI*2); ctx.fill();

  ctx.shadowColor = glowColor;
  ctx.shadowBlur = attacking ? 25 : 8;
  ctx.fillStyle = '#1a1030';

  
  ctx.beginPath();
  ctx.moveTo(-18, -32);
  ctx.lineTo(-22, 30);
  ctx.lineTo(-8, 80);
  ctx.lineTo(8, 80);
  ctx.lineTo(22, 30);
  ctx.lineTo(18, -32);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  
  ctx.shadowBlur = 0;

  
  ctx.strokeStyle = glowColor;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = attacking ? 25 : 8;
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';

  
  
  if (type === 'tank') {
    
    ctx.beginPath(); ctx.moveTo(-20, -15); ctx.lineTo(-38, 5); ctx.stroke();
    
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#1a1030';
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-50, -15); ctx.lineTo(-55, 10); ctx.lineTo(-38, 25);
    ctx.lineTo(-21, 10); ctx.lineTo(-26, -15);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    
    ctx.fillStyle = glowColor;
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.arc(-38, 7, 6, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = glowColor;
    ctx.shadowBlur = attacking ? 25 : 8;
    ctx.lineWidth = 6;
    
    ctx.beginPath(); ctx.moveTo(20, -15); ctx.lineTo(35, -5); ctx.stroke();
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(35, -5); ctx.lineTo(50, -25); ctx.stroke();
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(-38, 5, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(35, -5, 5, 0, Math.PI*2); ctx.fill();
    
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(-14, -65); ctx.lineTo(0, -72); ctx.lineTo(14, -65);
    ctx.stroke();
  } else if (type === 'dps') {
    
    ctx.beginPath(); ctx.moveTo(-20, -15); ctx.lineTo(-38, -10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20, -15); ctx.lineTo(38, -10); ctx.stroke();
    
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-38, -10); ctx.lineTo(-50, -35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(38, -10); ctx.lineTo(50, -35); ctx.stroke();
    
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff6622';
    ctx.fillStyle = 'rgba(255,102,34,0.5)';
    ctx.beginPath(); ctx.arc(-50, -35, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath(); ctx.arc(-50, -35, 3, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = 'rgba(255,102,34,0.5)';
    ctx.beginPath(); ctx.arc(50, -35, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath(); ctx.arc(50, -35, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = attacking ? 25 : 8;
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(-38, -10, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(38, -10, 5, 0, Math.PI*2); ctx.fill();
    
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(-12, -30); ctx.lineTo(-25, 60); ctx.lineTo(-5, 75);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(12, -30); ctx.lineTo(25, 60); ctx.lineTo(5, 75);
    ctx.stroke();
  } else {
    
    ctx.beginPath(); ctx.moveTo(20, -15); ctx.lineTo(40, -40); ctx.stroke();
    
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(40, -40); ctx.lineTo(42, -60); ctx.stroke();
    
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#69f0ae';
    ctx.fillStyle = 'rgba(105,240,174,0.4)';
    ctx.beginPath(); ctx.arc(42, -65, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#69f0ae';
    ctx.beginPath(); ctx.arc(42, -65, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = attacking ? 25 : 8;
    ctx.lineWidth = 6;
    
    ctx.beginPath(); ctx.moveTo(-20, -15); ctx.lineTo(-35, 10); ctx.stroke();
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(40, -40, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-35, 10, 5, 0, Math.PI*2); ctx.fill();
    
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(-8, -55, 6, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(8, -55, 6, 0, Math.PI*2); ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawEntranceOverlay(t) {
  var ea = state.entranceAnim;
  if (!ea) return;  

  
  var progress = 1 - (ea.timer / ea.duration);
  var color = C[ea.heroClass] || C.tank;

  
  
  
  

  var overlayAlpha;
  if (progress < 0.15) {
    overlayAlpha = (progress / 0.15) * 0.88;
  } else if (progress < 0.7) {
    overlayAlpha = 0.88;
  } else {
    overlayAlpha = 0.88 * (1 - (progress - 0.7) / 0.3);
  }

  
  ctx.save();
  ctx.globalAlpha = overlayAlpha;
  ctx.fillStyle = '#08041a';
  ctx.fillRect(0, 0, W, H);

  
  var vgrd = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.5);
  vgrd.addColorStop(0, color);
  vgrd.addColorStop(0.4, 'rgba(0,0,0,0)');
  vgrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = overlayAlpha * 0.2;
  ctx.fillStyle = vgrd;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  
  if (progress < 0.1) return;

  var contentAlpha = progress < 0.15 ? (progress - 0.1) / 0.05 : progress > 0.75 ? (1 - progress) / 0.25 : 1;
  ctx.save();
  ctx.globalAlpha = Math.max(0, contentAlpha);

  
  if (progress < 0.5) {
    var textProg = Math.min(1, (progress - 0.1) / 0.1);
    var textSize = Math.round(Math.min(W * 0.035, 40));
    ctx.font = 'bold ' + textSize + 'px Impact, Arial Black, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = C.gold;
    ctx.strokeStyle = '#1a0e3a';
    ctx.lineWidth = 3;
    var textY = H * 0.18;
    
    var textScale = 1 + (1 - textProg) * 0.5;
    ctx.save();
    ctx.translate(W * 0.5, textY);
    ctx.scale(textScale, textScale);
    ctx.strokeText('A NEW CHALLENGER APPROACHES!', 0, 0);
    ctx.fillText('A NEW CHALLENGER APPROACHES!', 0, 0);
    ctx.restore();
  }

  
  var heroScale = 1.8;
  var heroX = W * 0.5;
  var effectCY = H * 0.48;

  
  var pulse = 0.6 + Math.sin(t * 0.006) * 0.3;
  ctx.beginPath();
  ctx.arc(heroX, effectCY, 80 + pulse * 20, 0, Math.PI * 2);
  ctx.shadowColor = color;
  ctx.shadowBlur = 40;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = contentAlpha * pulse * 0.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = contentAlpha;

  
  ctx.save();
  ctx.globalAlpha = contentAlpha * 0.15;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  for (var i = 0; i < 12; i++) {
    var a = (Math.PI * 2 / 12) * i + t * 0.001;
    var r1 = 70;
    var r2 = 150 + Math.sin(t * 0.005 + i) * 30;
    ctx.beginPath();
    ctx.moveTo(heroX + Math.cos(a) * r1, effectCY + Math.sin(a) * r1);
    ctx.lineTo(heroX + Math.cos(a) * r2, effectCY + Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();

  
  var heroY = H * 0.65;
  var entranceHeroObj = { isMoving: false, walkCycle: 0, facingRight: true, idleCycle: 0, dead: false, _kickAnim: false, dieFrame: 0, dieAnimDone: false, _kickRecoverTimer: 0, castAnim: null, castFrame: 0, _pendingStreaks: null, _spellReleaseFrame: 0, _hitAnim: false, _hitFrame: 0 };
  drawHero(ctx, ea.heroClass, heroX, heroY, heroScale, t, true, ea.skinTone, entranceHeroObj);

  
  var nameSize = Math.round(Math.min(W * 0.06, 64));
  ctx.font = 'bold ' + nameSize + 'px Impact, Arial Black, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.strokeStyle = '#1a0e3a';
  ctx.lineWidth = 5;
  ctx.fillStyle = C.white;
  var nameY = H * 0.72;
  ctx.strokeText(ea.name, W * 0.5, nameY);
  ctx.fillText(ea.name, W * 0.5, nameY);

  
  var classSize = Math.round(nameSize * 0.45);
  ctx.font = 'bold ' + classSize + 'px Impact, Arial Black, sans-serif';
  ctx.fillStyle = color;
  ctx.strokeText(ea.heroClass.toUpperCase(), W * 0.5, nameY + nameSize * 1.05);
  ctx.fillText(ea.heroClass.toUpperCase(), W * 0.5, nameY + nameSize * 1.05);

  ctx.restore();
}



function drawHPBar(hp, phase, t) {
  var barW = W * 0.32;
  var barH = 30;
  var barX = (W - barW) / 2;
  var barY = H * 0.77;
  var r = barH / 2;

  
  ctx.save();
  roundRect(ctx, barX - 8, barY - 8, barW + 16, barH + 16, r + 8);
  ctx.fillStyle = C.indigo;
  ctx.strokeStyle = C.blue;
  ctx.lineWidth = 4;
  ctx.fill(); ctx.stroke();

  
  roundRect(ctx, barX - 3, barY - 3, barW + 6, barH + 6, r + 3);
  ctx.strokeStyle = C.blueLight;
  ctx.lineWidth = 2;
  ctx.stroke();

  
  roundRect(ctx, barX, barY, barW, barH, r);
  ctx.fillStyle = C.purple;
  ctx.fill();

  
  var fillW = Math.max(0, (hp / 100) * barW);
  if (fillW > 0) {
    ctx.save();
    
    roundRect(ctx, barX, barY, barW, barH, r);
    ctx.clip();

    var fgrd = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    fgrd.addColorStop(0, '#22bb66');
    fgrd.addColorStop(0.3, '#88dd22');
    fgrd.addColorStop(0.6, '#cccc11');
    fgrd.addColorStop(0.85, '#ee9922');
    fgrd.addColorStop(1, '#ee6622');
    ctx.fillStyle = fgrd;
    roundRect(ctx, barX, barY, fillW, barH, r);
    ctx.fill();

    
    var ggrd = ctx.createLinearGradient(0, barY, 0, barY + barH);
    ggrd.addColorStop(0, 'rgba(255,255,255,0.35)');
    ggrd.addColorStop(0.4, 'rgba(255,255,255,0.05)');
    ggrd.addColorStop(1, 'rgba(0,0,0,0.15)');
    ctx.fillStyle = ggrd;
    roundRect(ctx, barX, barY, fillW, barH, r);
    ctx.fill();

    ctx.restore();
  }

  
  ctx.font = 'bold ' + Math.round(barH * 0.75) + 'px Impact, Arial Black, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = C.white;
  ctx.strokeStyle = '#1a0e3a';
  ctx.lineWidth = 4;
  ctx.strokeText(Math.round(hp) + '%', barX + barW/2, barY + barH/2 + 1);
  ctx.fillText(Math.round(hp) + '%', barX + barW/2, barY + barH/2 + 1);

  
  var pi = phase || getPhase(hp);
  var phaseSize = Math.round(20 * (W/1200));
  var phaseY = (barY + barH + H - 14) / 2;
  var breathe = 1 + Math.sin(t * 0.003) * 0.06;
  ctx.font = 'bold ' + phaseSize + 'px Impact, Arial Black, sans-serif';
  ctx.save();
  ctx.textBaseline = 'middle';
  ctx.translate(W / 2, phaseY);
  ctx.scale(breathe, breathe);
  ctx.fillStyle = pi.color;
  ctx.strokeStyle = '#1a0e3a';
  ctx.lineWidth = 3;
  ctx.strokeText(pi.name, 0, 0);
  ctx.fillText(pi.name, 0, 0);
  ctx.restore();

  ctx.restore();
}

function drawVoteScreen(t) {
  if (state.scene !== 'vote') return;

  
  ctx.fillStyle = 'rgba(10,5,30,0.6)';
  ctx.fillRect(0, 0, W, H);

  var centerY = H * 0.35;
  var titleSize = Math.round(Math.min(W * 0.04, 48));

  
  ctx.font = 'bold ' + titleSize + 'px Impact, Arial Black, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = C.gold;
  ctx.strokeStyle = '#1a0e3a';
  ctx.lineWidth = 4;
  ctx.strokeText(state.voteTitle || 'CHOOSE YOUR ATTACK', W/2, centerY);
  ctx.fillText(state.voteTitle || 'CHOOSE YOUR ATTACK', W/2, centerY);

  
  var opts = state.voteOptions.length ? state.voteOptions : [
    { label: 'TANK', sub: 'Shield the party — absorb the blow', color: C.tank },
    { label: 'DPS', sub: 'Full burst — maximum damage', color: C.dps },
    { label: 'SUPPORT', sub: 'Heal and buff — empower the raid', color: C.support },
  ];

  var optW = Math.min(280, W * 0.25);
  var optH = 90;
  var gap = 30;
  var totalW = opts.length * optW + (opts.length - 1) * gap;
  var startX = (W - totalW) / 2;

  for (var i = 0; i < opts.length; i++) {
    var ox = startX + i * (optW + gap);
    var oy = centerY + 40;
    var pulse = 0.85 + Math.sin(t*0.004 + i*1.5) * 0.15;

    ctx.save();
    ctx.globalAlpha = pulse;

    
    roundRect(ctx, ox, oy, optW, optH, 10);
    ctx.fillStyle = 'rgba(20,12,50,0.9)';
    ctx.fill();
    ctx.strokeStyle = opts[i].color;
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.globalAlpha = 1;

    
    ctx.font = 'bold ' + Math.round(optW * 0.1) + 'px Impact, Arial Black, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = opts[i].color;
    ctx.fillText(opts[i].label, ox + optW/2, oy + 32);

    
    ctx.font = Math.round(optW * 0.048) + 'px Georgia, serif';
    ctx.fillStyle = '#8878aa';
    wrapText(ctx, opts[i].sub, ox + optW/2, oy + 55, optW - 20, 14);

    ctx.restore();
  }

  
  ctx.font = 'italic ' + Math.round(16 * W/1200) + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8878aa';
  ctx.fillText('Hold up your class card to vote!', W/2, centerY + 160);
}

function drawAttackEffect(t) {
  if (state.scene !== 'attack' || state.attackTimer <= 0) return;

  var progress = 1 - (state.attackTimer / 1.5); 
  var type = state.attackType || 'tank';
  var color = C[type] || C.tank;

  
  if (progress < 0.4) {
    
    var slashProg = progress / 0.4;
    ctx.save();
    ctx.globalAlpha = 1 - slashProg * 0.5;
    ctx.strokeStyle = color;
    ctx.lineWidth = 8 - slashProg * 6;
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    var sx = W * 0.3 + slashProg * W * 0.25;
    var sy = H * 0.5 - slashProg * H * 0.15;
    ctx.beginPath();
    ctx.moveTo(sx - 40, sy + 30);
    ctx.lineTo(sx + 40, sy - 30);
    ctx.stroke();
    ctx.restore();
  }

  
  if (progress > 0.3 && progress < 0.7) {
    var impProg = (progress - 0.3) / 0.4;
    var impX = state.bossX;
    var impY = state.bossY;
    ctx.save();
    ctx.globalAlpha = 1 - impProg;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.shadowColor = color;
    ctx.shadowBlur = 30;
    
    for (var i = 0; i < 8; i++) {
      var a = (Math.PI * 2 / 8) * i + impProg * 0.5;
      var r1 = 20 + impProg * 80;
      var r2 = 10 + impProg * 40;
      ctx.beginPath();
      ctx.moveTo(impX + Math.cos(a)*r2, impY + Math.sin(a)*r2);
      ctx.lineTo(impX + Math.cos(a)*r1, impY + Math.sin(a)*r1);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawSpecialEffect(t) {
  if (state.scene !== 'special') return;

  var progress = 1 - (state.attackTimer / 3); 

  
  if (progress < 0.3) {
    
    ctx.save();
    var chg = progress / 0.3;
    ctx.globalAlpha = chg * 0.8;
    ctx.strokeStyle = C.gold;
    ctx.lineWidth = 2;
    ctx.shadowColor = C.gold;
    ctx.shadowBlur = 30;
    var cx = W * 0.3;
    var cy = H * 0.55;
    for (var i = 0; i < 12; i++) {
      var a = (Math.PI*2/12)*i + t*0.005;
      var r = 50 + chg * 30;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 3+chg*4, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }

  if (progress > 0.25 && progress < 0.8) {
    
    var beamProg = (progress - 0.25) / 0.55;
    ctx.save();
    ctx.globalAlpha = (1 - beamProg) * 0.9;
    var bgrd = ctx.createLinearGradient(W*0.3, 0, W*0.55, 0);
    bgrd.addColorStop(0, C.gold);
    bgrd.addColorStop(0.5, C.white);
    bgrd.addColorStop(1, C.gold);
    ctx.fillStyle = bgrd;
    ctx.shadowColor = C.gold;
    ctx.shadowBlur = 40;
    var beamH = 20 + beamProg * 10;
    ctx.fillRect(W*0.3, H*0.35 - beamH/2, W*0.27, beamH);
    ctx.restore();
  }
}

function drawAnnouncement(t) {
  if (state.announceTimer <= 0 || !state.announceText) return;

  var progress = 1 - (state.announceTimer / 3);
  var alpha = progress < 0.1 ? progress/0.1 : progress > 0.8 ? (1-progress)/0.2 : 1;
  var scale = progress < 0.1 ? 0.8 + (progress/0.1)*0.2 : 1;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W/2, H * 0.2);
  ctx.scale(scale, scale);

  var size = Math.round(Math.min(W * 0.055, 60));
  ctx.font = 'bold ' + size + 'px Impact, Arial Black, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#1a0e3a';
  ctx.lineWidth = size * 0.08;
  ctx.strokeText(state.announceText, 0, 0);
  ctx.fillStyle = C.gold;
  ctx.shadowColor = '#f5a62380';
  ctx.shadowBlur = 20;
  ctx.fillText(state.announceText, 0, 0);

  ctx.restore();
}

function drawTagline() {
  var tagSize = Math.round(18 * W/1200);
  ctx.font = 'italic ' + tagSize + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#1a0e3a';
  ctx.lineWidth = 2;
  ctx.fillStyle = '#b8a0d0';
  ctx.strokeText('No One Solos a World Boss', W/2, H - 14);
  ctx.fillText('No One Solos a World Boss', W/2, H - 14);
}



var RAID_CAP = 0; 

function randomWanderTarget(heroClass) {
  
  
  
  
  if (heroClass === 'tank') {
    return {
      x: W * 0.45 + Math.random() * W * 0.25,
      y: H * 0.35 + Math.random() * H * 0.35,
    };
  } else if (heroClass === 'support') {
    return {
      x: W * 0.03 + Math.random() * W * 0.22,
      y: H * 0.45 + Math.random() * H * 0.4,
    };
  } else {
    return {
      x: W * 0.15 + Math.random() * W * 0.4,
      y: H * 0.3 + Math.random() * H * 0.5,
    };
  }
}

function addToRaidParty(name, heroClass, skinTone, dramatic) {
  var key = (name || 'HERO').toUpperCase();
  if (state.raidLookup[key]) return;  
  state.raidLookup[key] = true;

  
  if (RAID_CAP > 0 && state.raidParty.length >= RAID_CAP) {
    state.raidParty.shift();
  }

  var cls = heroClass || 'tank';
  var spawn = randomWanderTarget(cls);   
  var wander = randomWanderTarget(cls);  
  
  
  var maxHp = cls === 'tank' ? 100 : cls === 'dps' ? 55 : 65;
  var hero = {
    name: key,
    heroClass: cls,
    skinTone: skinTone || SKIN_TONES[Math.floor(Math.random() * SKIN_TONES.length)],
    x: dramatic ? -100 : spawn.x,       
    y: dramatic ? H * 0.5 : spawn.y,
    wanderX: wander.x,                  
    wanderY: wander.y,
    wanderSpeed: HERO_WALK_SPEED,
    drawScale: 1.3,                      
    attacking: false,                    
    attackTimer: 0,                      
    hp: maxHp,
    maxHp: maxHp,
    hpDisplay: maxHp,    
    healFlash: 0,        
    dead: false,         
    deathTimer: 0,       
    fleeing: false,      
    
    
    
    
    dodger: cls === 'tank' ? Math.random() < 0.75 : cls === 'dps' ? Math.random() < 0.50 : Math.random() < 0.90,
    
    rezTimer: 0,         
    rezBy: null,         
    angelTimer: 0,       
    bodyX: 0, bodyY: 0,  
    
    casting: false,      
    castTimer: 0,        
    castDur: 1.5,        
    
    shieldTimer: 0,      
    vineTimer: 0,        
    vineMax: 0,          
    fleeWings: 0,        
    gcdTimer: 0,         
    speechCooldown: 0,   
    
    walkCycle: Math.random() * 25,  
    facingRight: true,              
    isMoving: false,                
    wanderWait: 1 + Math.random() * 2, 
    idleCycle: Math.random() * 29,  
    dieFrame: 0,                    
    dieAnimDone: false,             
    _kickAnim: false,               
    _kickRecoverTimer: 0,            
    castAnim: null,                   
    castFrame: 0,                     
    _pendingStreaks: null,            
    _spellReleaseFrame: 0,           
    _hitAnim: false,                  
    _hitFrame: 0,                     
  };

  state.raidParty.push(hero);
  updateCameraTarget();

  if (dramatic) {
    state.entranceAnim = {
      name: hero.name,
      heroClass: hero.heroClass,
      skinTone: hero.skinTone,
      timer: 3.5,
      duration: 3.5,
    };
  }
}

function updateCameraTarget() {
  var n = state.raidParty.length;
  if (n <= 3)       state.cam.targetZoom = 1.0;
  else if (n <= 8)  state.cam.targetZoom = 0.92;
  else if (n <= 15) state.cam.targetZoom = 0.82;
  else if (n <= 25) state.cam.targetZoom = 0.72;
  else if (n <= 40) state.cam.targetZoom = 0.62;
  else              state.cam.targetZoom = 0.55;
}

function updateRaidParty(dt, t) {
  
  
  
  
  
  
  var _bbHand = getBB('hero-idle-right', 0);
  var spellHandOff = 90; 
  if (_bbHand && heroIdleSprite.naturalHeight > 0) {
    
    var _handFromFoot = _bbHand.h * 0.6;
    
    
    
    var _idleFH = heroIdleSprite.naturalHeight / HERO_IDLE_ROWS;
    spellHandOff = _handFromFoot * 240 / _idleFH * (224 / _bbHand.h);
  }

  
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];

    
    if (h.dead) {
      if (h.angelTimer > 0) h.angelTimer -= dt;
      
      if (!h.dieAnimDone) {
        h.dieFrame += dt * 12;
        if (h.dieFrame >= HERO_DIE_FRAMES - 1) {
          h.dieFrame = HERO_DIE_FRAMES - 1;
          h.dieAnimDone = true;
        }
      }
      
      if (!h.rezBy && !h.noRespawn) h.deathTimer -= dt;
      if (h.deathTimer <= 0 && !h.noRespawn) {
        
        h.dead = false;
        h.hp = h.maxHp;
        h.hpDisplay = h.maxHp;
        h.rezBy = null;
        h.rezTimer = 0;
        h.angelTimer = 0;
        h.dieFrame = 0;
        h.dieAnimDone = false;
        h._kickAnim = false;
        h._kickRecoverTimer = 0;
        h.castAnim = null;
        h.castFrame = 0;
        h._pendingStreaks = null;
        h._hitAnim = false;
        h._hitFrame = 0;
        h.dodger = h.heroClass === 'tank' ? Math.random() < 0.75 : h.heroClass === 'dps' ? Math.random() < 0.50 : Math.random() < 0.90;
        var sp = randomWanderTarget(h.heroClass);
        h.x = sp.x;
        h.y = sp.y;
        spawnBurst(h.x, h.y - 20, '#44ff88', 6, 2, 0.5);
      }
      continue; 
    }

    
    if (h._kickAnim && h._kickRecoverTimer > 0) {
      h._kickRecoverTimer -= dt;
      h.isMoving = false;
      h.dieFrame = 22; 
      if (h._kickRecoverTimer <= 0) {
        h._kickAnim = false;
        h.dieFrame = 0;
        h._kickRecoverTimer = 0;
      }
      continue; 
    }

    
    if (h._kicked && h._kickArcTimer !== undefined && h._kickArcDur) {
      h._kickArcTimer += dt;
      var arcProg = Math.min(1, h._kickArcTimer / h._kickArcDur);
      var sx = h._kickStartX, sy = h._kickStartY;
      var ex = h._kickEndX, ey = h._kickEndY;
      h.x = sx + (ex - sx) * arcProg;
      h.y = sy + (ey - sy) * arcProg - Math.sin(arcProg * Math.PI) * 180;
      h.dieFrame = Math.min(12, arcProg * 12);
      if (arcProg >= 1) {
        h.x = ex; h.y = ey;
        h._kickRecoverTimer = 0.7;
        delete h._kickArcTimer;
        delete h._kickArcDur;
        delete h._kicked;
        delete h._kickStartX; delete h._kickStartY;
        delete h._kickEndX; delete h._kickEndY;
      }
      continue;
    }

    
    if (h._hitAnim && !h._kickAnim && !h._kicked) {
      h._hitFrame += dt * 20; 
      h.isMoving = false;
      if (h._hitFrame >= HERO_HIT_FRAMES - 1) {
        h._hitAnim = false;
        h._hitFrame = 0;
      }
    }
    
    if (h.castAnim) {
      var castFrames = h.castAnim === 'rez' ? HERO_REZ_FRAMES : (h.castAnim === 'fireball' ? HERO_FIREBALL_FRAMES : HERO_HEALMM_FRAMES);
      h.castFrame += dt * (castFrames / 1.5); 
      h.isMoving = false;
      
      if (h._pendingStreaks && h.castFrame >= h._spellReleaseFrame) {
        var hs = h.drawScale * Math.min(W, H) / 1000;
        var handOffset = (h.facingRight ? 1 : -1) * 50 * hs;
        for (var ps = 0; ps < h._pendingStreaks.length; ps++) {
          var streak = h._pendingStreaks[ps];
          streak.x = h.x + handOffset;
          streak.y = h.y - spellHandOff * hs;
          state.battleStreaks.push(streak);
        }
        spawnBurst(h.x + handOffset, h.y - spellHandOff * hs, '#ffaa44', 6, 3, 0.4);
        h._pendingStreaks = null;
      }
      if (h.castFrame >= castFrames - 1) {
        h.castAnim = null;
        h.castFrame = 0;
        h._castSpell = null;
        h._pendingStreaks = null; 
      }
    }

    
    if (h._reverseCast) {
      h._reverseCastTimer -= dt;
      
      h.castAnim = 'heal';
      h.castFrame = Math.max(0, HEALMM_RELEASE_FRAME * (h._reverseCastTimer / 0.4));
      if (h._reverseCastTimer <= 0) {
        h._reverseCast = false;
        h.castAnim = null;
        h.castFrame = 0;
        h._castSpell = null;
      }
    }

    
    if (!h.castAnim) {
      var dx = h.wanderX - h.x;
      var dy = h.wanderY - h.y;
      var dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 15) {
        
        h.isMoving = false;
        h.idleCycle += dt * 6; 
        h.wanderSpeed = HERO_WALK_SPEED;
        if (!h.fleeing) {
          h.wanderWait -= dt;
          if (h.wanderWait <= 0) {
            
            var nw = randomWanderTarget(h.heroClass);
            var bestX = nw.x, bestY = nw.y, bestScore = 0;
            for (var att = 0; att < 3; att++) {
              var cand = randomWanderTarget(h.heroClass);
              var minNeighborDist = 9999;
              for (var sep_i = 0; sep_i < state.raidParty.length; sep_i++) {
                if (sep_i === i) continue;
                var o = state.raidParty[sep_i];
                if (o.dead) continue;
                var cdx = cand.x - o.x, cdy = cand.y - o.y;
                var cd = Math.sqrt(cdx * cdx + cdy * cdy);
                if (cd < minNeighborDist) minNeighborDist = cd;
              }
              if (minNeighborDist > bestScore) {
                bestScore = minNeighborDist;
                bestX = cand.x; bestY = cand.y;
              }
            }
            h.wanderX = bestX;
            h.wanderY = bestY;
            h.wanderWait = 2 + Math.random() * 3;
          }
        }
      } else {
        
        h.isMoving = true;
        if (Math.abs(dx) > 2) h.facingRight = dx > 0;
        h.walkCycle += dt * Math.max(8, h.wanderSpeed * 0.35);
        var step = h.wanderSpeed * dt;
        h.x += (dx / dist) * step;
        h.y += (dy / dist) * step;
      }
    } else {
      h.isMoving = false;
      h.idleCycle += dt * 6;
    }

    
    if (h.attackTimer > 0) {
      h.attackTimer -= dt;
      if (h.attackTimer <= 0) {
        h.attacking = false;
        
        if (h.rushing) {
          h.rushing = false;
          h.wanderSpeed = HERO_WALK_SPEED;
        }
      }
    }

    
    if (h.rushing) {
      h.rushTimer += dt;
      h.walkCycle += dt * Math.max(8, h.wanderSpeed * 0.35); 
      if (h.rushPhase === 'charge') {
        h.isMoving = true;
        if (Math.abs(h.rushTargetX - h.x) > 2) h.facingRight = (h.rushTargetX - h.x) > 0;
        
        var rdx = h.rushTargetX - h.x;
        var rdy = h.rushTargetY - h.y;
        var rdist = Math.sqrt(rdx * rdx + rdy * rdy);
        if (rdist < 25 || h.rushTimer > 1.5) {
          
          h.rushPhase = 'swing';
          h.rushTimer = 0;
          
          spawnBurst(state.bossX, state.bossY + 100 * (gameScale), C.tank, 12, 4, 0.6);
          
          state.battleStreaks.push({
            x: h.x, y: h.y - spellHandOff * h.drawScale * Math.min(W, H) / 1000,
            tx: state.bossX, ty: state.bossY + 120 * (gameScale),
            progress: 0.6,  
            color: '#ffffff',
            spell: 'tankSwing',
            casterName: h.name,
          });
        }
      } else if (h.rushPhase === 'swing') {
        
        if (h.rushTimer > 0.25) {
          
          h.rushPhase = 'return';
          h.rushTimer = 0;
          var nw = randomWanderTarget(h.heroClass);
          h.wanderX = nw.x;
          h.wanderY = nw.y;
          h.wanderSpeed = 50 + Math.random() * 20;  
        }
      } else if (h.rushPhase === 'return') {
        
        var retDx = h.wanderX - h.x;
        var retDy = h.wanderY - h.y;
        if (Math.sqrt(retDx * retDx + retDy * retDy) < 20 || h.rushTimer > 2.0) {
          h.rushing = false;
          h.wanderSpeed = HERO_WALK_SPEED;  
        }
      }
    }

    
    if (typeof h.hpDisplay === 'undefined') h.hpDisplay = h.hp;
    h.hpDisplay += (h.hp - h.hpDisplay) * Math.min(1, dt * 6);

    
    if (h.healFlash > 0) h.healFlash -= dt * 2;
    
    if (h.fleeWings > 0) h.fleeWings -= dt;
    if (h.shieldTimer > 0) h.shieldTimer -= dt;
    if (h.vineTimer > 0) h.vineTimer -= dt;
    if (h.gcdTimer > 0) h.gcdTimer -= dt;
    if (h.speechCooldown > 0) h.speechCooldown -= dt;

    
    if (h.hp > 0 && h.hp < h.maxHp) {
      h.hp = Math.min(h.maxHp, h.hp + 0.5 * dt);
    }
  }

  
  
  
  
  
  
  
  for (var si = 0; si < state.raidParty.length; si++) {
    var sup = state.raidParty[si];
    if (sup.heroClass !== 'support' || sup.dead) continue;
    if (sup.hp <= 0) continue;

    
    var rezTarget = null;
    var rezDist = Infinity;
    for (var di = 0; di < state.raidParty.length; di++) {
      var dead = state.raidParty[di];
      if (!dead.dead || dead.angelTimer > 0) continue; 
      if (!dead.dead || dead.angelTimer > 0) continue; 
      if (dead.rezBy && dead.rezBy !== sup) continue; 
      var ddx = dead.bodyX - sup.x;
      var ddy = dead.bodyY - sup.y;
      var dd = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dd < rezDist) { rezDist = dd; rezTarget = dead; }
    }

    if (rezTarget) {
      
      if (rezDist > 30) {
        sup.wanderX = rezTarget.bodyX;
        sup.wanderY = rezTarget.bodyY;
        sup.wanderSpeed = 60; 
        rezTarget.rezBy = sup;
        sup.casting = false;
        sup.castTimer = 0;
      } else {
        
        sup.wanderSpeed = 0; 
        sup.casting = true;
        if (sup.castAnim !== 'rez') { sup.castAnim = 'rez'; sup.castFrame = 0; }
        rezTarget.rezBy = sup;
        rezTarget.rezTimer += dt;
        sup.castTimer = rezTarget.rezTimer;
        sup.castDur = 1.5;
        if (rezTarget.rezTimer >= 1.5) {
          
          rezTarget.dead = false;
          rezTarget.hp = rezTarget.maxHp * 0.5; 
          rezTarget.hpDisplay = rezTarget.hp;
          rezTarget.rezBy = null;
          rezTarget.rezTimer = 0;
          rezTarget.angelTimer = 0;
          rezTarget.dieFrame = 0;
          rezTarget.dieAnimDone = false;
          rezTarget._kickAnim = false;
          rezTarget._kickRecoverTimer = 0;
          rezTarget.castAnim = null;
          rezTarget.castFrame = 0;
          rezTarget.x = rezTarget.bodyX;
          rezTarget.y = rezTarget.bodyY;
          var rezNw = randomWanderTarget(rezTarget.heroClass);
          rezTarget.wanderX = rezNw.x;
          rezTarget.wanderY = rezNw.y;
          rezTarget.dodger = rezTarget.heroClass === 'tank' ? Math.random() < 0.75 : rezTarget.heroClass === 'dps' ? Math.random() < 0.50 : rezTarget.heroClass === 'support' ? Math.random() < 0.90 : Math.random() < 0.50;
          spawnBurst(rezTarget.x, rezTarget.y - 20, '#ffd740', 12, 3, 0.8);
          logCombat(sup.name + ' resurrected ' + rezTarget.name, '#ffd740');
          sup.wanderSpeed = HERO_WALK_SPEED;
          sup.casting = false;
          sup.castTimer = 0;
          sup.castAnim = null;
          sup.castFrame = 0;
          continue;
        }
      }
      continue; 
    } else {
      
      sup.casting = false;
      if (sup.wanderSpeed !== HERO_WALK_SPEED && !sup.fleeing) sup.wanderSpeed = HERO_WALK_SPEED;
      if (sup.wanderSpeed < 10) sup.wanderSpeed = HERO_WALK_SPEED;
    }

    
    for (var ai = 0; ai < state.raidParty.length; ai++) {
      if (ai === si) continue;
      var ally = state.raidParty[ai];
      if (ally.dead || ally.hp >= ally.maxHp || ally.hp <= 0) continue;
      var hdx = ally.x - sup.x;
      var hdy = ally.y - sup.y;
      var hdist = Math.sqrt(hdx * hdx + hdy * hdy);
      if (hdist < W * 0.15 && sup.gcdTimer <= 0 && !sup.castAnim && !sup._kickAnim) {
        ally.hp = Math.min(ally.maxHp, ally.hp + 5);
        if (ally.healFlash <= 0) ally.healFlash = 0.4;
        sup.gcdTimer = 1.5 + Math.random() * 0.4;  
      }
    }
  }

  
  
  
  var deadCount = 0;
  for (var dc = 0; dc < state.raidParty.length; dc++) {
    if (state.raidParty[dc].dead) deadCount++;
  }
  for (var ti = 0; ti < state.raidParty.length; ti++) {
    var tank = state.raidParty[ti];
    if (tank.heroClass !== 'tank' || tank.dead || tank.fleeing) continue;
    var tdx = tank.wanderX - tank.x;
    var tdy = tank.wanderY - tank.y;
    var tdist = Math.sqrt(tdx * tdx + tdy * tdy);
    if (tdist < 15) {
      
      var bScale = gameScale;
      tank.wanderX = state.bossX + (Math.random() - 0.7) * W * 0.12;
      tank.wanderY = state.bossY + 280 * bScale + (Math.random() - 0.5) * H * 0.1;
      tank.wanderWait = 0.5 + Math.random() * 1.5; 
      tank.wanderSpeed = deadCount > 0 ? (55 + Math.random() * 15) : HERO_WALK_SPEED;
    }
  }

  
  state.cam.zoom += (state.cam.targetZoom - state.cam.zoom) * Math.min(1, dt * 2);
  
  var bossBodyCenter = state.bossY + 200 * gameScale;
  var idealX = W * 0.65;  
  var idealY = H * 0.35;  
  var targetPanX = (state.bossX - idealX) * 0.3;
  var targetPanY = (bossBodyCenter - idealY) * 0.3;
  state.cam.panX += (targetPanX - state.cam.panX) * Math.min(1, dt * 0.8);
  state.cam.panY += (targetPanY - state.cam.panY) * Math.min(1, dt * 0.8);

  
  
  
  
  
  
  
  
  if (state.raidParty.length > 0 && !state.entranceAnim) {
    state.idleTimer -= dt;
    if (state.idleTimer <= 0) {
      var ri = Math.floor(Math.random() * state.raidParty.length);
      var hero = state.raidParty[ri];
      if (!hero.attacking && !hero.dead && hero.hp > 0 && hero.gcdTimer <= 0 && !hero.castAnim && !hero._kickAnim && !hero._kickRecoverTimer) {
        hero.attacking = true;
        hero.attackTimer = 1.5;
        hero.gcdTimer = 1.5 + Math.random() * 0.4;  
        var hs = hero.drawScale * Math.min(W, H) / 1000; 

        if (hero.heroClass === 'support') {
          
          var rezCandidate = null;
          var injured = null;
          var lowestRatio = 1;
          for (var ti = 0; ti < state.raidParty.length; ti++) {
            var candidate = state.raidParty[ti];
            if (ti === ri) continue;
            if (candidate.dead && candidate.angelTimer <= 0 && !rezCandidate) {
              rezCandidate = candidate;
            }
            if (!candidate.dead && candidate.hp > 0) {
              var r = candidate.hp / candidate.maxHp;
              if (r < lowestRatio) { lowestRatio = r; injured = candidate; }
            }
          }
          if (injured && lowestRatio < 0.85) {
            
            hero.facingRight = injured.x > hero.x;
            hero.castAnim = 'heal';
            hero.castFrame = 0;
            hero._pendingStreaks = [{
              tx: injured.x, ty: injured.y - 110 * hs,
              progress: 0,
              color: '#44ff88',
              isHeal: true,
              healTarget: injured,
              casterName: hero.name,
            }];
            hero._spellReleaseFrame = HEALMM_RELEASE_FRAME;
          } else {
            
            
            hero.facingRight = state.bossX > hero.x;
            hero.castAnim = 'heal';
            hero._castSpell = 'bloodDraw';
            hero.castFrame = 0;
            var bossScale = gameScale;
            var supTxOff = (Math.random() - 0.5) * 40;
            var supTyOff = (Math.random() - 0.5) * 60;
            hero._pendingStreaks = [{
              
              tx: state.bossX + supTxOff, ty: state.bossY + 120 * bossScale + supTyOff,
              _txOff: supTxOff, _tyOff: supTyOff,
              progress: 0,
              color: '#cc0000',
              spell: 'bloodDraw',
              casterName: hero.name,
              casterRef: hero,   
            }];
            hero._spellReleaseFrame = HEALMM_RELEASE_FRAME;
          }
        } else if (hero.heroClass === 'dps') {
          
          var spellType = Math.random() < 0.5 ? 'fireball' : 'missile';
          hero.facingRight = state.bossX > hero.x;
          hero.castAnim = spellType;
          hero.castFrame = 0;
          hero._pendingStreaks = [];
          hero._spellReleaseFrame = spellType === 'fireball' ? FIREBALL_RELEASE_FRAME : HEALMM_RELEASE_FRAME;
          var bossScale = gameScale;
          var txOff = (Math.random() - 0.5) * 60;
          var tyOff = (Math.random() - 0.5) * 80;
          var targetX = state.bossX + txOff;
          var targetY = state.bossY + 120 * bossScale + tyOff;
          if (spellType === 'missile') {
            
            var numBeams = 6 + Math.floor(Math.random() * 7);
            var beams = [];
            var baseAngle = Math.atan2(targetY - (hero.y - spellHandOff * hs), targetX - hero.x);
            for (var md = 0; md < numBeams; md++) {
              var fanAngle = baseAngle + Math.PI + (Math.random() - 0.5) * Math.PI * 1.6;
              var arcDist = 100 + Math.random() * 160;
              beams.push({
                arcX: Math.cos(fanAngle) * arcDist,
                arcY: Math.sin(fanAngle) * arcDist,
                delay: md * 0.04 + Math.random() * 0.06,
                speed: 0.7 + Math.random() * 0.35,
              });
            }
            hero._pendingStreaks.push({
              tx: targetX, ty: targetY,
              _txOff: txOff, _tyOff: tyOff,
              progress: 0,
              color: '#00eeff',
              spell: 'missile',
              beams: beams,
              casterName: hero.name,
            });
          } else {
            
            hero._pendingStreaks.push({
              tx: targetX, ty: targetY,
              _txOff: txOff, _tyOff: tyOff,
              progress: 0,
              color: '#ff4400',
              spell: 'fireball',
              casterName: hero.name,
            });
          }
        } else {
          
          hero.rushing = true;
          hero.rushPhase = 'charge';  
          hero.rushTimer = 0;
          hero.preRushX = hero.x;
          hero.preRushY = hero.y;
          
          hero.rushTargetX = state.bossX + (Math.random() - 0.5) * 40;
          hero.rushTargetY = state.bossY + 200 * (gameScale);
          hero.wanderX = hero.rushTargetX;
          hero.wanderY = hero.rushTargetY;
          hero.wanderSpeed = 90 + Math.random() * 30;  
          hero.attackTimer = 2.5;  
        }
      }
      state.idleTimer = 0.2 + Math.random() * 0.6;
    }
  }

  
  
  
  
  
  for (var j = state.battleStreaks.length - 1; j >= 0; j--) {
    var s = state.battleStreaks[j];
    
    if (s.isHeal && s.healTarget && !s.healTarget.dead) {
      s.tx = s.healTarget.x;
      s.ty = s.healTarget.y - spellHandOff * (s.healTarget.drawScale || 1) * Math.min(W, H) / 1000;
    } else if (!s.isHeal && s.spell !== 'tankSwing') {
      var bossScale = gameScale;
      s.tx = state.bossX + (s._txOff || 0);
      s.ty = state.bossY + 120 * bossScale + (s._tyOff || 0);
    }
    
    if (s.spell === 'bloodDraw' && s.casterRef) {
      var chs = (s.casterRef.drawScale || 1) * Math.min(W, H) / 1000;
      s.x = s.casterRef.x;
      s.y = s.casterRef.y - spellHandOff * chs;
      
      if (s._bloodReturn) {
        var bossScale = gameScale;
        s._returnFromX = state.bossX + (s._txOff || 0);
        s._returnFromY = state.bossY + 120 * bossScale + (s._tyOff || 0);
      }
    }
    
    
    var spd = s.spell === 'missile' ? 1.0 : s.spell === 'fireball' ? 1.4 : s.spell === 'bloodDraw' ? 1.1 : s.isHeal ? 1.6 : 2.5;
    
    if (s._bloodReturn) spd = 1.4;
    s.progress += dt * spd;

    if (s.progress >= 1) {
      

      
      if (s.spell === 'bloodDraw' && !s._bloodReturn) {
        
        spawnBurst(s.tx, s.ty, '#cc0000', 12, 5, 0.8);
        spawnBurst(s.tx, s.ty, '#880000', 8, 3, 0.6);
        spawnBurst(s.tx, s.ty, '#ff3333', 6, 2, 0.5);
        if (s.casterName) logCombat(s.casterName + ' drains OUTRAGE — Blood for the Blood Bank!', '#cc0000');
        
        s._bloodReturn = true;
        s.progress = 0;
        
        var tmpX = s.tx, tmpY = s.ty;
        s._returnFromX = tmpX;
        s._returnFromY = tmpY;
        
        continue;  
      }

      
      if (s.spell === 'bloodDraw' && s._bloodReturn) {
        spawnBurst(s.x, s.y, '#cc0000', 6, 3, 0.4);
        spawnBurst(s.x, s.y, '#880000', 4, 2, 0.3);
        
        if (s.casterRef && s.casterRef.castAnim === null) {
          s.casterRef._reverseCast = true;
          s.casterRef._reverseCastTimer = 0.4;
        }
        state.battleStreaks.splice(j, 1);
        continue;
      }

      if (s.isHeal && s.healTarget) {
        
        s.healTarget.hp = Math.min(s.healTarget.maxHp, s.healTarget.hp + 10);
        s.healTarget.healFlash = 0.6;
        s.healTarget.vineTimer = 1.4;
        s.healTarget.vineMax = 1.4;
        
        s.healTarget.shieldTimer = Math.max(s.healTarget.shieldTimer || 0, 2.5);
        if (s.casterName) logCombat(s.casterName + ' heals ' + s.healTarget.name, '#69f0ae');
      } else if (s.spell === 'fireball') {
        
        spawnBurst(s.tx, s.ty, '#ff2200', 24, 8, 1.2);
        spawnBurst(s.tx, s.ty, '#ff6600', 18, 6, 1.0);
        spawnBurst(s.tx, s.ty, '#ff8800', 14, 5, 0.8);
        spawnBurst(s.tx, s.ty, '#ffcc44', 10, 4, 0.6);
        spawnBurst(s.tx, s.ty, '#442200', 10, 3, 0.7);
        if (s.casterName) logCombat(s.casterName + ' hits OUTRAGE with Fireball!', '#ff6600');
      } else if (s.spell === 'missile') {
        
        spawnBurst(s.tx, s.ty, '#00eeff', 16, 6, 0.8);
        spawnBurst(s.tx, s.ty, '#00ffff', 10, 4, 0.6);
        spawnBurst(s.tx, s.ty, '#ffffff', 6, 2, 0.4);
        if (s.casterName) logCombat(s.casterName + ' hits OUTRAGE with Magic Missile!', '#00eeff');
      } else {
        spawnBurst(s.tx, s.ty, s.color, 4, 2, 0.4);
      }
      state.battleStreaks.splice(j, 1);
    }
  }

  
  if (state.entranceAnim) {
    state.entranceAnim.timer -= dt;
    if (state.entranceAnim.timer <= 0) {
      state.entranceAnim = null;
      if (state.scene === 'entrance') state.scene = 'idle';
    }
  }
}



function drawRaidParty(t, behindBoss) {
  
  
  
  var bbIdleFoot = getBB('hero-idle-right', 0);
  var sorted = state.raidParty.slice().sort(function(a, b) {
    var aScale = a.drawScale * Math.min(W, H) / 1000;
    var bScale = b.drawScale * Math.min(W, H) / 1000;
    
    var aY = bbIdleFoot ? a.y + bbIdleFoot.footY * aScale : a.y;
    var bY = bbIdleFoot ? b.y + bbIdleFoot.footY * bScale : b.y;
    return aY - bY;
  });
  var bossFootY = state.bossY + 320 * gameScale; 
  for (var i = 0; i < sorted.length; i++) {
    var h = sorted[i];
    var heroY = h.dead ? h.bodyY : h.y;
    
    if (behindBoss && heroY >= bossFootY) continue;
    if (!behindBoss && heroY < bossFootY) continue;
    if (h.dead) {
      var ds = h.drawScale * Math.min(W, H) / 1000;

      
      if (!h.dieAnimDone) {
        drawHero(ctx, h.heroClass, h.bodyX, h.bodyY, h.drawScale, t, false, h.skinTone, h);
      }

      
      if (h.dieAnimDone) {
      ctx.save();
      var tx = h.bodyX;
      var ty = h.bodyY - 10 * ds;  
      var ts = ds * 2.4; 
      var bodyColor = C[h.heroClass] || C.tank;

      
      ctx.fillStyle = '#3a2a18';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.ellipse(tx, ty + 12 * ts, 22 * ts, 7 * ts, 0, 0, Math.PI * 2);
      ctx.fill();

      
      ctx.globalAlpha = 0.8;
      var stoneW = 24 * ts;
      var stoneH = 32 * ts;
      var stoneX = tx - stoneW / 2;
      var stoneY = ty - stoneH + 8 * ts;
      var radius = 8 * ts;
      ctx.fillStyle = '#555566';
      ctx.strokeStyle = '#333344';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(stoneX + radius, stoneY);
      ctx.arcTo(stoneX + stoneW, stoneY, stoneX + stoneW, stoneY + stoneH, radius);
      ctx.arcTo(stoneX + stoneW, stoneY + stoneH, stoneX, stoneY + stoneH, 2);
      ctx.arcTo(stoneX, stoneY + stoneH, stoneX, stoneY, 2);
      ctx.arcTo(stoneX, stoneY, stoneX + stoneW, stoneY, radius);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 2 * ts;
      ctx.globalAlpha = 0.7;
      var crossY = stoneY + stoneH * 0.32;
      ctx.beginPath();
      ctx.moveTo(tx, crossY - 6 * ts);
      ctx.lineTo(tx, crossY + 8 * ts);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx - 5 * ts, crossY);
      ctx.lineTo(tx + 5 * ts, crossY);
      ctx.stroke();

      
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#aaa';
      var ripSize = Math.max(8, Math.round(7 * ts));
      ctx.font = 'bold ' + ripSize + 'px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('RIP', tx, crossY + 10 * ts);

      
      var tombNameSize = Math.round(18 * ds);
      if (tombNameSize < 10) tombNameSize = 10;
      var tombNameY = stoneY - 16;
      ctx.globalAlpha = 1;
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#0a0520';
      ctx.lineWidth = 2.5;
      ctx.font = 'bold ' + tombNameSize + 'px Arial, sans-serif';
      ctx.textBaseline = 'bottom';
      ctx.fillStyle = bodyColor;
      ctx.strokeText(h.name, tx, tombNameY);
      ctx.fillText(h.name, tx, tombNameY);
      
      var tombGuildSize = Math.max(9, Math.round(14 * ds));
      ctx.font = tombGuildSize + 'px Arial, sans-serif';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#8bc34a';
      ctx.globalAlpha = 0.8;
      ctx.strokeText('<RIT>', tx, tombNameY + 3);
      ctx.fillText('<RIT>', tx, tombNameY + 3);

      ctx.restore();
      } 

      
      if (h.rezBy && h.rezTimer > 0) {
        var rezProg = h.rezTimer / 1.5;
        var rx = h.bodyX;
        var ry = h.bodyY + 8 * ds;
        var rezR = 60 * ds;
        var rezH = 100 * ds; 
        var pulse = 0.6 + Math.sin(t * 0.01) * 0.2;

        ctx.save();
        ctx.shadowColor = '#ffd740';
        ctx.shadowBlur = 30;

        
        ctx.globalAlpha = (0.4 + rezProg * 0.4) * pulse;
        ctx.fillStyle = '#ffd740';
        ctx.beginPath();
        ctx.ellipse(rx, ry, rezR, rezR * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.globalAlpha = 0.6 + rezProg * 0.4;
        ctx.strokeStyle = '#ffe082';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(rx, ry, rezR, rezR * 0.3, 0, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * rezProg);
        ctx.stroke();
        
        ctx.globalAlpha = 0.3 + rezProg * 0.3;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(rx, ry, rezR * 0.75, rezR * 0.75 * 0.3, 0, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * rezProg);
        ctx.stroke();

        
        var domeTop = ry - rezH * rezProg; 
        ctx.shadowBlur = 20;
        ctx.globalAlpha = 0.25 + rezProg * 0.35;
        ctx.fillStyle = 'rgba(255,224,130,0.2)';
        ctx.strokeStyle = '#ffd740';
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.moveTo(rx - rezR, ry);
        ctx.quadraticCurveTo(rx - rezR * 0.8, domeTop, rx, domeTop - 8 * ds);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(rx + rezR, ry);
        ctx.quadraticCurveTo(rx + rezR * 0.8, domeTop, rx, domeTop - 8 * ds);
        ctx.stroke();
        
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.moveTo(rx - rezR, ry);
        ctx.quadraticCurveTo(rx - rezR * 0.8, domeTop, rx, domeTop - 8 * ds);
        ctx.quadraticCurveTo(rx + rezR * 0.8, domeTop, rx + rezR, ry);
        ctx.closePath();
        ctx.fill();

        
        ctx.globalAlpha = 0.7 + rezProg * 0.3;
        ctx.strokeStyle = '#ffeb3b';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#ffeb3b';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        var waveY = ry;
        var waveW = rezR * 0.9;
        for (var wi = -1; wi <= 1; wi += 0.05) {
          var wx = rx + wi * waveW;
          var wy = waveY + Math.sin(wi * 8 + t * 0.012) * 6 * ds * rezProg;
          if (wi === -1) ctx.moveTo(wx, wy);
          else ctx.lineTo(wx, wy);
        }
        ctx.stroke();

        
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#fff';
        for (var si = 0; si < 10; si++) {
          var sparkPhase = (t * 0.003 + si * 0.7) % 1;
          ctx.globalAlpha = rezProg * 0.8 * (1 - sparkPhase);
          var sx = rx + Math.sin(si * 2.1 + t * 0.004) * rezR * 0.5;
          var sy = ry - sparkPhase * rezH * rezProg;
          var sparkSize = (1 - sparkPhase) * 4 * ds;
          ctx.beginPath();
          ctx.arc(sx, sy, sparkSize, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      
      if (h.angelTimer > 0) {
        var angelProg = 1 - (h.angelTimer / 2.5);
        var floatY = h.bodyY - 250 * angelProg - 40; 
        var floatX = h.bodyX;
        var driftY = angelProg * 50; 
        floatY += driftY;
        var angelAlpha = 1 - angelProg;
        
        var perspScale = 1 + angelProg * 0.6; 
        var ads = ds * 2 * perspScale;

        ctx.save();
        ctx.globalAlpha = angelAlpha * 0.5;

        
        drawHero(ctx, h.heroClass, floatX, floatY, h.drawScale * 1.2 * perspScale, t, false, h.skinTone);

        
        ctx.globalAlpha = angelAlpha * 0.4;
        ctx.strokeStyle = '#fff';
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 2;
        var wingSpan = 36 * ads / 2;
        var wingFlap = Math.sin(t * 0.012) * 8 * perspScale;
        
        ctx.beginPath();
        ctx.moveTo(floatX - 8 * ads / 2, floatY - 40 * ads / 2);
        ctx.quadraticCurveTo(floatX - wingSpan - wingFlap, floatY - 70 * ads / 2 - wingFlap, floatX - wingSpan * 0.6, floatY - 25 * ads / 2);
        ctx.fill();
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(floatX + 8 * ads / 2, floatY - 40 * ads / 2);
        ctx.quadraticCurveTo(floatX + wingSpan + wingFlap, floatY - 70 * ads / 2 - wingFlap, floatX + wingSpan * 0.6, floatY - 25 * ads / 2);
        ctx.fill();
        ctx.stroke();

        
        ctx.globalAlpha = angelAlpha * 0.6;
        ctx.strokeStyle = '#ffd740';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(floatX, floatY - 55 * ads / 2, 16 * ads / 2, 6 * ads / 2, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }
    } else {
      
      if (h.casting && h.castTimer > 0) {
        ctx.save();
        ctx.shadowColor = '#ffd740';
        ctx.shadowBlur = 25;
        ctx.globalAlpha = 0.6 + Math.sin(t * 0.01) * 0.2;
        drawHero(ctx, h.heroClass, h.x, h.y, h.drawScale, t, false, h.skinTone, h);
        ctx.restore();
      }
      
      if (h.fleeWings > 0) {
        var ws = h.drawScale * Math.min(W, H) / 1000;
        var wingAlpha = Math.min(1, h.fleeWings / 0.3); 
        var wingFlap = Math.sin(t * 0.02) * 0.3; 
        ctx.save();
        ctx.translate(h.x, h.y - 127 * ws);
        ctx.globalAlpha = wingAlpha * 0.85;
        
        ctx.save();
        ctx.scale(-1, 1);
        ctx.rotate(wingFlap - 0.2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(25 * ws, -30 * ws, 50 * ws, -15 * ws);
        ctx.quadraticCurveTo(40 * ws, -5 * ws, 30 * ws, 5 * ws);
        ctx.quadraticCurveTo(15 * ws, -5 * ws, 0, 0);
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(10 * ws, -5 * ws); ctx.lineTo(35 * ws, -12 * ws); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8 * ws, 0); ctx.lineTo(30 * ws, -3 * ws); ctx.stroke();
        ctx.restore();
        
        ctx.save();
        ctx.rotate(wingFlap - 0.2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(25 * ws, -30 * ws, 50 * ws, -15 * ws);
        ctx.quadraticCurveTo(40 * ws, -5 * ws, 30 * ws, 5 * ws);
        ctx.quadraticCurveTo(15 * ws, -5 * ws, 0, 0);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(10 * ws, -5 * ws); ctx.lineTo(35 * ws, -12 * ws); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8 * ws, 0); ctx.lineTo(30 * ws, -3 * ws); ctx.stroke();
        ctx.restore();
        ctx.restore();
      }
      drawHero(ctx, h.heroClass, h.x, h.y, h.drawScale, t, h.attacking, h.skinTone, h);

      
      if (h.shieldTimer > 0) {
        var ss = h.drawScale * Math.min(W, H) / 1000;
        var shieldAlpha = h.shieldTimer < 0.5 ? h.shieldTimer / 0.5 : 0.4;
        var shieldR = 70 * ss;
        var shimmer = Math.sin(t * 0.006) * 0.15;
        var shieldCY = h.y - 93 * ss; 
        ctx.save();
        ctx.globalAlpha = shieldAlpha + shimmer;
        
        var shieldGrad = ctx.createRadialGradient(h.x, shieldCY, shieldR * 0.2, h.x, shieldCY, shieldR);
        shieldGrad.addColorStop(0, 'rgba(100,255,180,0.05)');
        shieldGrad.addColorStop(0.6, 'rgba(100,255,180,0.15)');
        shieldGrad.addColorStop(0.85, 'rgba(150,255,200,0.3)');
        shieldGrad.addColorStop(1, 'rgba(200,255,220,0.1)');
        ctx.fillStyle = shieldGrad;
        ctx.beginPath();
        ctx.arc(h.x, shieldCY, shieldR, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(150,255,200,0.5)';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#69f0ae';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(h.x, shieldCY, shieldR, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.globalAlpha = (shieldAlpha + shimmer) * 0.3;
        ctx.strokeStyle = '#aaffcc';
        ctx.lineWidth = 1;
        for (var hi = 0; hi < 6; hi++) {
          var ha = hi * Math.PI / 3 + t * 0.001;
          var hx = h.x + Math.cos(ha) * shieldR * 0.55;
          var hy = shieldCY + Math.sin(ha) * shieldR * 0.55;
          ctx.beginPath();
          for (var hv = 0; hv < 6; hv++) {
            var va = hv * Math.PI / 3;
            var vx = hx + Math.cos(va) * shieldR * 0.2;
            var vy = hy + Math.sin(va) * shieldR * 0.2;
            if (hv === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
          }
          ctx.closePath();
          ctx.stroke();
        }
        ctx.restore();
      }

      
      if (h.vineTimer > 0 && h.vineMax > 0) {
        var vs = h.drawScale * Math.min(W, H) / 1000;
        var vProg = 1 - (h.vineTimer / h.vineMax); 
        var vineAlpha, vineScale;
        if (vProg < 0.4) {
          
          vineAlpha = 1;
          vineScale = vProg / 0.4; 
        } else if (vProg < 0.7) {
          
          vineAlpha = 1;
          vineScale = 1;
        } else {
          
          vineAlpha = 1 - (vProg - 0.7) / 0.3;
          vineScale = 1 - (vProg - 0.7) / 0.3;
        }
        ctx.save();
        ctx.translate(h.x, h.y);
        ctx.globalAlpha = vineAlpha * 0.85;
        
        var numVines = 8;
        for (var vi = 0; vi < numVines; vi++) {
          var vineAngle = (vi / numVines) * Math.PI * 2;
          var vineBaseX = Math.cos(vineAngle) * 25 * vs;
          var vineHeight = 123 * vs * vineScale; 
          ctx.strokeStyle = vi % 2 === 0 ? '#2d8a4e' : '#45b06a';
          ctx.lineWidth = 4 * vs;
          ctx.shadowColor = '#44ff88';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(vineBaseX, -31 * vs); 
          var segments = 5;
          for (var si = 1; si <= segments; si++) {
            var sFrac = si / segments;
            var sx = vineBaseX * (1 - sFrac * 0.8) + Math.sin(t * 0.005 + vi * 2 + si) * 8 * vs * sFrac;
            var sy = -31 * vs - vineHeight * sFrac;
            ctx.lineTo(sx, sy);
          }
          ctx.stroke();
          
          if (vineScale > 0.3) {
            ctx.fillStyle = vi % 2 === 0 ? '#3daa5e' : '#55cc7a';
            for (var li = 1; li <= 3; li++) {
