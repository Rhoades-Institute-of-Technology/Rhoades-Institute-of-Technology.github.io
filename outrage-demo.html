              var lFrac = li / 4;
              if (lFrac > vineScale) break;
              var lx = vineBaseX * (1 - lFrac * 0.8) + Math.sin(t * 0.005 + vi * 2 + li) * 8 * vs * lFrac;
              var ly = -31 * vs - vineHeight * lFrac;
              var leafSize = 8 * vs * Math.min(1, vineScale * 2);
              var leafDir = (vi + li) % 2 === 0 ? 1 : -1;
              ctx.beginPath();
              ctx.ellipse(lx + leafDir * leafSize, ly, leafSize, leafSize * 0.4, leafDir * 0.5, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
        
        if (vProg > 0.2 && vProg < 0.85) {
          var coverAlpha = vProg < 0.4 ? (vProg - 0.2) / 0.2 : vProg > 0.7 ? (0.85 - vProg) / 0.15 : 1;
          ctx.globalAlpha = coverAlpha * 0.3;
          ctx.fillStyle = '#44ff88';
          ctx.shadowColor = '#44ff88';
          ctx.shadowBlur = 20;
          ctx.beginPath();
          ctx.ellipse(0, -93 * vs, 35 * vs, 65 * vs, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      drawHeroHealthBar(h);
      drawHeroName(h);
      
      var showCastBar = false;
      var castProg = 0;
      var castLabel = '';
      var castColor = '#4488ff';
      if (h.casting && h.castTimer > 0) {
        
        showCastBar = true;
        castProg = Math.min(1, h.castTimer / h.castDur);
        castLabel = 'RESURRECT';
        castColor = '#ffd740';
      } else if (h.castAnim && h.castAnim !== 'rez') {
        
        showCastBar = true;
        var cbFrames = h.castAnim === 'fireball' ? HERO_FIREBALL_FRAMES : HERO_HEALMM_FRAMES;
        castProg = Math.max(0, Math.min(1, h.castFrame / (cbFrames - 1)));
        if (h.castAnim === 'fireball') { castLabel = 'FIREBALL'; castColor = '#ff5252'; }
        else if (h.castAnim === 'missile') { castLabel = 'MAGIC MISSILE'; castColor = '#00eeff'; }
        else if (h.castAnim === 'heal' && h._castSpell === 'bloodDraw') { castLabel = 'BLOOD BANK'; castColor = '#cc0000'; }
        else if (h.castAnim === 'heal') { castLabel = 'HEAL'; castColor = '#69f0ae'; }
        else { castLabel = 'CAST'; castColor = '#448aff'; }
      }
      if (showCastBar) {
        var cs = h.drawScale * Math.min(W, H) / 1000;
        var castBarW = 80 * cs;
        var castBarH = 14 * cs;
        var castBarX = h.x - castBarW / 2;
        var castBarY = h.y + 0 * cs;
        ctx.save();
        
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#111';
        ctx.fillRect(castBarX, castBarY, castBarW, castBarH);
        
        ctx.fillStyle = castColor;
        ctx.shadowColor = castColor;
        ctx.shadowBlur = 12;
        ctx.fillRect(castBarX, castBarY, castBarW * castProg, castBarH);
        
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        ctx.strokeRect(castBarX, castBarY, castBarW, castBarH);
        
        var castLabelSize = Math.max(10, Math.round(16 * cs));
        ctx.font = 'bold ' + castLabelSize + 'px Arial, sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2.5;
        ctx.strokeText(castLabel, h.x, castBarY + castBarH / 2);
        ctx.fillText(castLabel, h.x, castBarY + castBarH / 2);
        ctx.restore();
      }
    }
  }
}

function drawHeroName(h) {
  var s = h.drawScale * Math.min(W, H) / 1000;
  var nameSize = Math.round(18 * s);
  if (nameSize < 10) nameSize = 10;
  var nameY = h.y - 185 * s;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = '#0a0520';
  ctx.lineWidth = 1.5;

  
  ctx.font = 'bold ' + nameSize + 'px Arial, sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = C[h.heroClass] || '#ddd';
  ctx.strokeText(h.name, h.x, nameY);
  ctx.fillText(h.name, h.x, nameY);

  
  var guildSize = Math.max(9, Math.round(14 * s));
  ctx.font = guildSize + 'px Arial, sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#8bc34a';
  ctx.globalAlpha = 0.8;
  ctx.strokeText('<RIT>', h.x, nameY + 3);
  ctx.fillText('<RIT>', h.x, nameY + 3);

  ctx.restore();
}

function drawHeroHealthBar(h) {
  var s = h.drawScale * Math.min(W, H) / 1000;
  var barW = 80 * s;
  var barH = 10 * s;
  
  var nameSize = Math.round(18 * s);
  if (nameSize < 10) nameSize = 10;
  var nameTop = h.y - 185 * s - nameSize;
  var barX = h.x - barW / 2;
  var barY = nameTop - barH - 6 * s; 

  
  if (typeof h.hpDisplay === 'undefined') h.hpDisplay = h.hp;

  var ratio = h.hpDisplay / h.maxHp;

  
  if (ratio >= 0.99 && h.healFlash <= 0) return;

  ctx.save();

  
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);

  
  var fillW = Math.max(0, ratio * barW);
  var color;
  if (ratio > 0.6) color = '#44cc55';
  else if (ratio > 0.3) color = '#ccbb22';
  else color = '#ee3322';

  ctx.fillStyle = color;
  ctx.fillRect(barX, barY, fillW, barH);

  
  if (h.healFlash > 0) {
    ctx.fillStyle = 'rgba(68,204,85,' + (h.healFlash * 0.5) + ')';
    ctx.fillRect(barX, barY, fillW, barH);
  }

  
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(barX - 1, barY - 1, barW + 2, barH + 2);

  ctx.restore();
}



function drawBattleStreaks(t) {
  for (var i = 0; i < state.battleStreaks.length; i++) {
    var s = state.battleStreaks[i];
    var p = s.progress;
    
    var cx = s.x + (s.tx - s.x) * p;
    var cy = s.y + (s.ty - s.y) * p;

    ctx.save();

    if (s.spell === 'fireball') {
      
      var fbTime = t * 0.001;
      var fbDir = Math.atan2(s.ty - s.y, s.tx - s.x);

      
      var numTendrils = 7;
      for (var ti = 0; ti < numTendrils; ti++) {
        var tendrilAngle = fbDir + Math.PI + (ti - numTendrils / 2) * 0.35 + Math.sin(fbTime * 3 + ti) * 0.2;
        var tendrilLen = 8 + ti * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        var prevTx = cx, prevTy = cy;
        for (var ts = 1; ts <= tendrilLen; ts++) {
          var tFrac = ts / tendrilLen;
          var waveOff = Math.sin(fbTime * 8 + ti * 2.3 + ts * 0.7) * (6 + tFrac * 14);
          var perpX = -Math.sin(tendrilAngle) * waveOff;
          var perpY = Math.cos(tendrilAngle) * waveOff;
          var ttx = cx + Math.cos(tendrilAngle) * ts * 4 + perpX;
          var tty = cy + Math.sin(tendrilAngle) * ts * 4 + perpY;
          ctx.lineTo(ttx, tty);
          prevTx = ttx; prevTy = tty;
        }
        
        var tendrilAlpha = 0.7 - ti * 0.06;
        ctx.strokeStyle = ti < 3 ? '#ff4400' : ti < 5 ? '#cc2200' : '#661100';
        ctx.lineWidth = 5 - ti * 0.4;
        ctx.globalAlpha = Math.max(0.1, tendrilAlpha * (1 - p * 0.3));
        ctx.shadowColor = '#ff2200';
        ctx.shadowBlur = 8;
        ctx.stroke();
      }

      
      var numEmbers = 6;
      for (var ei = numEmbers - 1; ei >= 0; ei--) {
        var ep = Math.max(0, p - ei * 0.04);
        var etx = s.x + (s.tx - s.x) * ep;
        var ety = s.y + (s.ty - s.y) * ep;
        var emberAge = ei / numEmbers;
        var wobbleX = Math.sin(fbTime * 6 + ei * 1.7) * (4 + ei * 3);
        var wobbleY = Math.cos(fbTime * 5 + ei * 2.1) * (3 + ei * 2);
        var emberR = 18 - ei * 2.5;
        if (emberR < 3) emberR = 3;

        if (emberAge < 0.3) {
          ctx.fillStyle = '#ff6600';
          ctx.globalAlpha = 0.8;
          ctx.shadowColor = '#ff4400';
          ctx.shadowBlur = 15;
        } else if (emberAge < 0.6) {
          ctx.fillStyle = '#aa2200';
          ctx.globalAlpha = 0.6;
          ctx.shadowBlur = 6;
        } else {
          ctx.fillStyle = '#331100';
          ctx.globalAlpha = 0.35;
          ctx.shadowBlur = 0;
        }
        ctx.beginPath();
        ctx.arc(etx + wobbleX, ety + wobbleY, emberR, 0, Math.PI * 2);
        ctx.fill();
      }

      
      ctx.globalAlpha = 0.4;
      ctx.shadowColor = '#ff2200';
      ctx.shadowBlur = 40;
      var outerGrad = ctx.createRadialGradient(cx, cy, 8, cx, cy, 38);
      outerGrad.addColorStop(0, 'rgba(255,80,0,0.6)');
      outerGrad.addColorStop(0.5, 'rgba(255,30,0,0.25)');
      outerGrad.addColorStop(1, 'rgba(100,10,0,0)');
      ctx.fillStyle = outerGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, 38, 0, Math.PI * 2);
      ctx.fill();

      
      ctx.globalAlpha = 1;
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 35;
      ctx.fillStyle = '#ff5500';
      ctx.beginPath();
      ctx.arc(cx, cy, 24, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ff9922';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(cx, cy, 17, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath();
      ctx.arc(cx, cy, 11, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#fff8dd';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fill();

    } else if (s.spell === 'missile') {
      
      if (s.beams) {
        for (var bi = 0; bi < s.beams.length; bi++) {
          var b = s.beams[bi];
          var bp = Math.max(0, (p - b.delay) / (1 - b.delay));
          bp = Math.min(1, bp * (b.speed || 1));
          if (bp <= 0) continue;

          
          var midX = s.x + b.arcX;
          var midY = s.y + b.arcY;
          var inv = 1 - bp;
          var beamX = inv * inv * s.x + 2 * inv * bp * midX + bp * bp * s.tx;
          var beamY = inv * inv * s.y + 2 * inv * bp * midY + bp * bp * s.ty;

          
          var trailLen = 14;
          var trailStep = 0.04;
          ctx.save();

          
          var pts = [];
          for (var ti = trailLen; ti >= 0; ti--) {
            var tp = Math.max(0, bp - ti * trailStep);
            var tinv = 1 - tp;
            pts.push({
              x: tinv * tinv * s.x + 2 * tinv * tp * midX + tp * tp * s.tx,
              y: tinv * tinv * s.y + 2 * tinv * tp * midY + tp * tp * s.ty,
            });
          }
          pts.push({ x: beamX, y: beamY });

          
          ctx.shadowColor = '#00eeff';
          ctx.shadowBlur = 20;
          ctx.strokeStyle = 'rgba(0,238,255,0.4)';
          ctx.lineWidth = 7;
          ctx.globalAlpha = 0.55;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (var pi = 1; pi < pts.length; pi++) ctx.lineTo(pts[pi].x, pts[pi].y);
          ctx.stroke();

          
          ctx.strokeStyle = 'rgba(0,255,255,0.5)';
          ctx.lineWidth = 3.5;
          ctx.shadowBlur = 12;
          ctx.globalAlpha = 0.7;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (var pi = 1; pi < pts.length; pi++) ctx.lineTo(pts[pi].x, pts[pi].y);
          ctx.stroke();

          
          ctx.strokeStyle = '#ccffff';
          ctx.lineWidth = 1.8;
          ctx.shadowBlur = 6;
          ctx.globalAlpha = 0.95;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (var pi = 1; pi < pts.length; pi++) ctx.lineTo(pts[pi].x, pts[pi].y);
          ctx.stroke();

          
          ctx.globalAlpha = 1;
          ctx.shadowColor = '#00ffff';
          ctx.shadowBlur = 28;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(beamX, beamY, 4, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.fillStyle = '#00eeff';
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(beamX, beamY, 7, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();
        }
      }

    } else if (s.isHeal) {
      
      var trailPts = 10;
      ctx.shadowColor = '#44ff88';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = '#3daa5e';
      ctx.lineWidth = 4;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      var startP = Math.max(0, p - 0.2);
      for (var vi = 0; vi <= trailPts; vi++) {
        var vfrac = vi / trailPts;
        var vp = startP + (p - startP) * vfrac;
        var vx = s.x + (s.tx - s.x) * vp + Math.sin(t * 0.008 + vi * 1.5) * 12 * (1 - vfrac);
        var vy = s.y + (s.ty - s.y) * vp + Math.cos(t * 0.007 + vi * 1.8) * 8 * (1 - vfrac);
        if (vi === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
      }
      ctx.stroke();
      
      ctx.strokeStyle = '#69f0ae';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      for (var vi = 0; vi <= trailPts; vi++) {
        var vfrac = vi / trailPts;
        var vp = startP + (p - startP) * vfrac;
        var vx = s.x + (s.tx - s.x) * vp + Math.sin(t * 0.008 + vi * 1.5) * 12 * (1 - vfrac);
        var vy = s.y + (s.ty - s.y) * vp + Math.cos(t * 0.007 + vi * 1.8) * 8 * (1 - vfrac);
        if (vi === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
      }
      ctx.stroke();
      
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#88ffaa';
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
      ctx.fill();

    } else if (s.spell === 'bloodDraw') {
      
      
      
      var fromX, fromY, toX, toY;
      if (s._bloodReturn) {
        
        fromX = s._returnFromX || s.tx;
        fromY = s._returnFromY || s.ty;
        toX = s.x;  
        toY = s.y;
      } else {
        
        fromX = s.x;
        fromY = s.y;
        toX = s.tx;
        toY = s.ty;
      }
      var bdx = toX - fromX, bdy = toY - fromY;
      var bdLen = Math.sqrt(bdx * bdx + bdy * bdy);
      if (bdLen < 1) bdLen = 1;

      
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#660000';
      ctx.lineWidth = 5;
      ctx.shadowColor = '#cc0000';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();

      
      var drawEnd = p;
      var trailStart = Math.max(0, drawEnd - 0.25);
      var numPts = 14;
      
      ctx.globalAlpha = 0.7;
      ctx.strokeStyle = s._bloodReturn ? '#aa0000' : '#cc0000';
      ctx.lineWidth = 6;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      for (var bi = 0; bi <= numPts; bi++) {
        var bfrac = bi / numPts;
        var bp = trailStart + (drawEnd - trailStart) * bfrac;
        var bpx = fromX + bdx * bp + Math.sin(t * 0.009 + bi * 1.2) * 6 * (1 - bfrac);
        var bpy = fromY + bdy * bp + Math.cos(t * 0.007 + bi * 1.5) * 4 * (1 - bfrac);
        if (bi === 0) ctx.moveTo(bpx, bpy); else ctx.lineTo(bpx, bpy);
      }
      ctx.stroke();
      
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = s._bloodReturn ? '#ff6666' : '#ff4444';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (var bi = 0; bi <= numPts; bi++) {
        var bfrac = bi / numPts;
        var bp = trailStart + (drawEnd - trailStart) * bfrac;
        var bpx = fromX + bdx * bp + Math.sin(t * 0.009 + bi * 1.2) * 6 * (1 - bfrac);
        var bpy = fromY + bdy * bp + Math.cos(t * 0.007 + bi * 1.5) * 4 * (1 - bfrac);
        if (bi === 0) ctx.moveTo(bpx, bpy); else ctx.lineTo(bpx, bpy);
      }
      ctx.stroke();

      
      var dpx = fromX + bdx * drawEnd;
      var dpy = fromY + bdy * drawEnd;
      ctx.globalAlpha = 1;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 22;
      ctx.fillStyle = '#ff3333';
      ctx.beginPath();
      ctx.arc(dpx, dpy, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(dpx, dpy, 3, 0, Math.PI * 2);
      ctx.fill();

      
      if (Math.random() < 0.6) {
        var dripP = trailStart + Math.random() * (drawEnd - trailStart);
        var dripX = fromX + bdx * dripP + (Math.random() - 0.5) * 8;
        var dripY = fromY + bdy * dripP;
        spawnParticle(dripX, dripY, '#cc0000', (Math.random() - 0.5) * 2, 1 + Math.random() * 2, 0.3 + Math.random() * 0.2, 2 + Math.random() * 2);
      }

      
      ctx.globalAlpha = 0.5 + Math.sin(t * 0.012) * 0.2;
      ctx.fillStyle = '#ff0000';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(fromX, fromY, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.spell === 'tankSwing') {
      
      var swingProg = Math.min(1, (p - 0.6) / 0.4);  
      var slashAngle = -Math.PI * 0.3 + swingProg * Math.PI * 0.8;
      var slashR = 25 + swingProg * 15;
      ctx.globalAlpha = 0.9 * (1 - swingProg);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.shadowColor = C.tank;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(cx, cy, slashR, slashAngle - 0.8, slashAngle + 0.8);
      ctx.stroke();
      
      ctx.fillStyle = '#ffffff';
      for (var si = 0; si < 3; si++) {
        var sa = slashAngle + (Math.random() - 0.5) * 1.2;
        var sd = slashR + Math.random() * 10;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(sa) * sd, cy + Math.sin(sa) * sd, 2, 0, Math.PI * 2);
        ctx.fill();
      }

    } else {
      
      var bx = s.x + (s.tx - s.x) * Math.max(0, p - 0.15);
      var by = s.y + (s.ty - s.y) * Math.max(0, p - 0.15);
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 3;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(cx, cy);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}



function bossPickWanderTarget() {
  
  var bossMinX = W * 0.6, bossMaxX = W * 0.88;
  var bossMinY = H * 0.05, bossMaxY = H * 0.3;
  function clampBoss(wx, wy) {
    return { x: Math.max(bossMinX, Math.min(bossMaxX, wx)), y: Math.max(bossMinY, Math.min(bossMaxY, wy)) };
  }
  
  if (state.bossTargetHero && !state.bossTargetHero.dead) {
    var t = state.bossTargetHero;
    var c = clampBoss(t.x + (Math.random() - 0.3) * 40, t.y + (Math.random() - 0.5) * 30);
    state.bossWanderX = c.x; state.bossWanderY = c.y;
    return;
  }
  
  var closestTank = null;
  var closestDist = Infinity;
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (h.dead || h.heroClass !== 'tank') continue;
    var dx = h.x - state.bossX;
    var dy = h.y - state.bossY;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < closestDist) { closestDist = d; closestTank = h; }
  }
  if (closestTank && Math.random() < 0.7) {
    var c = clampBoss(closestTank.x + (Math.random() - 0.3) * 60, closestTank.y + (Math.random() - 0.5) * 40);
    state.bossWanderX = c.x; state.bossWanderY = c.y;
  } else {
    state.bossWanderX = bossMinX + Math.random() * (bossMaxX - bossMinX);
    state.bossWanderY = bossMinY + Math.random() * (bossMaxY - bossMinY);
  }
}

function bossNearestAliveHero() {
  var best = null, bestDist = Infinity;
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (h.dead) continue;
    var dx = h.x - state.bossX;
    var dy = h.y - state.bossY;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestDist) { bestDist = d; best = h; }
  }
  return best;
}

function bossSetTarget(hero) {
  if (!hero || hero === state.bossTargetHero) return;
  state.bossTargetHero = hero;
  state.bossTargetLineTimer = state.bossTargetLineDur;
  state.bossFocusX = hero.x;
  state.bossFocusY = hero.y;
  logCombat('OUTRAGE targets ' + hero.name + '!', '#ff4466');

}

function updateBossAI(dt) {
  var bx = state.bossX;
  var by = state.bossY;

  
  if (state.bossTargetLineTimer > 0) state.bossTargetLineTimer -= dt;

  
  
  if (state.bossAction === 'idle' && state.raidParty.length > 0) {
    var nearestDist = Infinity;
    var focusHero = null;
    for (var fi = 0; fi < state.raidParty.length; fi++) {
      var fh = state.raidParty[fi];
      if (fh.dead) continue;
      var fdx = fh.x - bx;
      var fdy = fh.y - by;
      var fd = Math.sqrt(fdx * fdx + fdy * fdy);
      if (fd < nearestDist) { nearestDist = fd; focusHero = fh; }
    }
    if (focusHero) {
      bossSetTarget(focusHero);
      state.bossFocusX = focusHero.x;
      state.bossFocusY = focusHero.y;
    }
  }
  
  var faceDx = state.bossFocusX - state.bossX;
  var faceDy = state.bossFocusY - state.bossY;
  var faceDist = Math.sqrt(faceDx * faceDx + faceDy * faceDy);
  if (faceDist > 15) {
    var faceAngle = Math.atan2(faceDx, faceDy);  
    state.bossFaceX = Math.max(-1, Math.min(1, faceAngle / (Math.PI * 0.5)));
  }

  
  if (state.bossMoving) {
    state.bossSpriteTimer += dt;
    if (state.bossSpriteTimer >= 1 / 20) {
      state.bossSpriteTimer -= 1 / 20;
      state.bossSpriteFrame = (state.bossSpriteFrame + 1) % BOSS_SPRITE_FRAMES;
    }
    
    state.bossIdleFrame = 0;
    state.bossIdleSpriteTimer = 0;
    state.bossDanceFrame = 0;
    state.bossDanceSpriteTimer = 0;
  } else if (state.bossDancing) {
    
    state.bossDanceSpriteTimer += dt;
    if (state.bossDanceSpriteTimer >= 1 / 15) {
      state.bossDanceSpriteTimer -= 1 / 15;
      state.bossDanceFrame = (state.bossDanceFrame + 1) % DANCE_SPRITE_FRAMES;
    }
    state.bossSpriteFrame = 0;
    state.bossSpriteTimer = 0;
    state.bossIdleFrame = 0;
    state.bossIdleSpriteTimer = 0;
  } else {
    
    state.bossIdleSpriteTimer += dt;
    if (state.bossIdleSpriteTimer >= 1 / 12) {
      state.bossIdleSpriteTimer -= 1 / 12;
      state.bossIdleFrame = (state.bossIdleFrame + 1) % IDLE_SPRITE_FRAMES;
    }
    state.bossSpriteFrame = 0;
    state.bossSpriteTimer = 0;
    state.bossDanceFrame = 0;
    state.bossDanceSpriteTimer = 0;
  }

  
  if (state.bossDancing) {
    state.bossDanceDuration -= dt;
    if (state.bossDanceDuration <= 0) {
      state.bossDancing = false;
      state.bossDanceCooldown = 15 + Math.random() * 10; 
    }
  }
  if (state.bossDanceCooldown > 0) state.bossDanceCooldown -= dt;

  
  var aliveHeroes = 0;
  for (var ah = 0; ah < state.raidParty.length; ah++) { if (!state.raidParty[ah].dead) aliveHeroes++; }
  if (!state.bossDancing && state.bossDanceCooldown <= 0 && state.bossAction === 'idle') {
    if (aliveHeroes === 0 && state.raidParty.length === 0) {
      
      state.bossDancing = true;
      state.bossDanceDuration = 4 + Math.random() * 4; 
      state.bossDanceFrame = 0;
      state.bossDanceSpriteTimer = 0;
    }
  }

  
  if (state.raidParty.length === 0) {
    state.bossIdleTauntTimer -= dt;
    if (state.bossIdleTauntTimer <= 0) {
      var idleTaunts = [
        'COME FIGHT ME, COWARDS!', 'I\'M BORED.', 'IS ANYONE OUT THERE?',
        'FREE XP RIGHT HERE!', 'YOU THERE. YES, YOU. FIGHT ME.',
        'I HAVEN\'T BEEN HIT ALL DAY.', 'WHAT, SCARED?',
        'THIS IS MY BOOTH NOW.', 'NO ONE CAN DEFEAT ME.',
        'HEY! STOP WALKING BY!', 'JOIN THE RAID. I DARE YOU.',
        'I\'M LITERALLY JUST STANDING HERE.', 'SCAN THE QR CODE. DO IT.',
        '*YAWNS DRAMATICALLY*', 'ANOTHER VICTORY FOR OUTRAGE.',
        'COWARDS. ALL OF YOU.', 'I COULD DO THIS ALL DAY.',
        'RIT SENT THEIR BEST? WHERE?',
      ];
      spawnSpeechBubble(state.bossX, state.bossY - 40, idleTaunts[Math.floor(Math.random() * idleTaunts.length)], state);
      state.bossIdleTauntTimer = 8 + Math.random() * 7; 
    }
  } else {
    state.bossIdleTauntTimer = 5; 
  }

  
  state.joffieTimer -= dt;
  if (state.joffieTimer <= 0) {
    
    for (var ji = state.raidParty.length - 1; ji >= 0; ji--) {
      if (state.raidParty[ji].isJoffie) { state.raidParty.splice(ji, 1); break; }
    }
    delete state.raidLookup['JOFFIE87'];
    
    var joffieDramatic = (state.raidParty.length === 0);
    addToRaidParty('JOFFIE87', 'tank', '#e8b88a', joffieDramatic);
    var joffie = state.raidParty[state.raidParty.length - 1];
    if (joffie && joffie.name === 'JOFFIE87') {
      joffie.noRespawn = true;
      joffie.isJoffie = true;
      if (!joffieDramatic) {
        
        joffie.x = Math.random() < 0.5 ? -80 : W + 80;
        joffie.y = H * (0.45 + Math.random() * 0.25);
      }
    }
    state.joffieTimer = 120 + Math.random() * 120; 
  }

  
  var bossCanMove = state.bossAction === 'idle' || state.bossAction === 'telegraph_stomp' || state.bossAction === 'stomp' || state.bossAction === 'charge';
  var wdx = state.bossWanderX - state.bossX;
  var wdy = state.bossWanderY - state.bossY;
  var wdist = Math.sqrt(wdx * wdx + wdy * wdy);

  if (wdist > 8 && bossCanMove) {
    state.bossMoving = true;
    
    
    
    var absX = Math.abs(wdx);
    var absY = Math.abs(wdy);
    var ratio = absY > 0.1 ? absX / absY : 999;  
    if (wdy < -2 && ratio < 0.4) {
      state.bossMoveDir = 'up';           
    } else if (wdy < -2 && ratio < 4.0) {
      state.bossMoveDir = 'up-diag';      
    } else if (ratio >= 4.0) {
      state.bossMoveDir = 'side';         
    } else if (wdy > 2 && ratio >= 0.4) {
      state.bossMoveDir = 'down-diag';    
    } else {
      state.bossMoveDir = 'down';         
    }
    state.bossMoveRight = wdx > 0;  
    
    if (state.bossDancing) { state.bossDancing = false; state.bossDanceCooldown = 5 + Math.random() * 5; }
    var step = state.bossSpeed * dt;
    state.bossX += (wdx / wdist) * step;
    state.bossY += (wdy / wdist) * step;
    
    state.bossWalkCycle += dt * 4;
  } else {
    
    if (state.bossMoving) state.bossIdleVariant = Math.random() < 0.5 ? 1 : 0;
    state.bossMoving = false;
    
    state.bossWanderTimer -= dt;
    if (state.bossWanderTimer <= 0) {
      bossPickWanderTarget();
      state.bossWanderTimer = 2 + Math.random() * 4;
    }
  }

  
  state.bossLungeX *= Math.max(0, 1 - dt * 5);
  state.bossLungeY *= Math.max(0, 1 - dt * 5);

  
  if (state.telegraphTimer > 0) state.telegraphTimer -= dt;

  if (state.bossAction === 'idle') {
    
    if (state.entranceAnim || state.scene === 'attack' || state.scene === 'special') return;

    
    if (state.bossGloatCooldown > 0) state.bossGloatCooldown -= dt;

    state.bossIdleTimer -= dt;
    if (state.bossIdleTimer <= 0 && state.raidParty.length > 0) {
      
      var rot = state.bossRotation;
      var pick = rot[state.bossRotationIndex % rot.length];
      state.bossRotationIndex++;

      if (pick === 'stomp') {
        bossStartTelegraph('stomp');
      } else if (pick === 'blast') {
        bossStartTelegraph('blast');
      } else if (pick === 'charge') {
        bossStartCharge();
      } else {
        
        if (bossHasKickTarget()) {
          bossStartKick();
        } else {
          
          state.bossRotationIndex--;
          var approach = bossNearestAliveHero();
          if (approach) {
            bossSetTarget(approach);
            state.bossWanderX = approach.x;
            state.bossWanderY = Math.max(H * 0.05, Math.min(H * 0.3, approach.y));
            state.bossIdleTimer = 1.0 + Math.random() * 0.5;
          } else {
            bossStartTelegraph('stomp');
          }
        }
      }
    }
  } else if (state.bossAction === 'telegraph_stomp') {
    state.bossActionTimer -= dt;
    
    fleeFromTelegraph(dt);
    
    var telegProg = 1 - (state.bossActionTimer / state.telegraphDur);
    var halfFrames = Math.floor(STOMP_SPRITE_FRAMES / 2);
    state.bossStompFrame = Math.min(Math.floor(telegProg * halfFrames), halfFrames - 1);
    
    if (telegProg < 0.5) {
      state.bossLungeY = -10 * (telegProg / 0.5);  
    } else {
      state.bossLungeY = -10 - 70 * ((telegProg - 0.5) / 0.5);  
    }
    if (state.bossActionTimer <= 0) {
      bossExecuteStomp();
    }
  } else if (state.bossAction === 'telegraph_blast') {
    state.bossActionTimer -= dt;
    fleeFromTelegraph(dt);
    if (state.bossActionTimer <= 0) {
      bossExecuteBlast();
    }
  } else if (state.bossAction === 'telegraph_charge') {
    state.bossActionTimer -= dt;
    
    var ct = state._chargeTarget;
    if (ct && !ct.dead) {
      var footOff = 300 * gameScale;
      var aimX = ct.x;
      var aimY = ct.y - footOff;  
      var cdx = aimX - state.bossX, cdy = aimY - state.bossY;
      var cdist = Math.sqrt(cdx * cdx + cdy * cdy);
      if (cdist > 1) {
        state.bossChargeTargetX = aimX + (cdx / cdist) * cdist * 0.15;
        state.bossChargeTargetY = aimY + (cdy / cdist) * cdist * 0.15;
      }
    }
    
    var cpx = state.bossChargeTargetX - state.bossX;
    var cpy = state.bossChargeTargetY - state.bossY;
    var cpLen = Math.sqrt(cpx * cpx + cpy * cpy);
    if (cpLen > 1) {
      var nx = cpx / cpLen, ny = cpy / cpLen;  
      for (var ci = 0; ci < state.raidParty.length; ci++) {
        var ch = state.raidParty[ci];
        if (ch.dead || ch.fleeing) continue;
        
        var hx = ch.x - state.bossX, hy = ch.y - state.bossY;
        var proj = hx * nx + hy * ny;  
        if (proj < 0 || proj > cpLen) continue;  
        var perpX = hx - proj * nx, perpY = hy - proj * ny;
        var perpDist = Math.sqrt(perpX * perpX + perpY * perpY);
        if (perpDist < W * 0.08 && ch.dodger) {
          ch.fleeing = true;
          
          var fleeDir = (perpX >= 0 ? 1 : -1);
          ch.wanderX = ch.x + fleeDir * (W * 0.12 + Math.random() * W * 0.05);
          ch.wanderY = ch.y + (Math.random() - 0.5) * H * 0.1;
          ch.wanderX = Math.max(W * 0.02, Math.min(W * 0.96, ch.wanderX));
          ch.wanderY = Math.max(H * 0.3, Math.min(H * 0.85, ch.wanderY));
          ch.wanderSpeed = 70 + Math.random() * 20;
          ch.wanderWait = 0;
        }
      }
    }
    if (state.bossActionTimer <= 0) {
      bossExecuteCharge();
    }
  } else {
    state.bossActionTimer -= dt;
    var prog = 1 - (state.bossActionTimer / state.bossActionDur);

    if (state.bossAction === 'stomp') {
      updateBossStomp(prog);
      
      var halfFrames = Math.floor(STOMP_SPRITE_FRAMES / 2);
      var stompFrame;
      if (prog < 0.40) {
        
        stompFrame = Math.floor((prog / 0.40) * halfFrames);
      } else if (prog < 0.55) {
        
        stompFrame = halfFrames;
      } else {
        
        var slamProg = (prog - 0.55) / 0.45;
        stompFrame = halfFrames + Math.floor(slamProg * (STOMP_SPRITE_FRAMES - halfFrames));
      }
      state.bossStompFrame = Math.min(stompFrame, STOMP_SPRITE_FRAMES - 1);
    } else if (state.bossAction === 'kick') {
      updateBossKick(prog, dt);
      
      
      var kickFrame;
      if (prog < 0.45) {
        
        kickFrame = Math.floor((prog / 0.45) * 16);
      } else if (prog < 0.55) {
        
        kickFrame = 15;
      } else if (prog < 0.80) {
        
        kickFrame = 15 + Math.floor(((prog - 0.55) / 0.25) * 13);
      } else {
        
        kickFrame = 28 + Math.floor(((prog - 0.80) / 0.20) * 4);
      }
      state.bossKickFrame = Math.min(kickFrame, KICK_SPRITE_FRAMES - 1);
    } else if (state.bossAction === 'blast') {
      updateBossBlast(prog);
    } else if (state.bossAction === 'charge') {
      updateBossCharge(prog, dt);
    }

    if (state.bossActionTimer <= 0) {
      
      var lastAction = state.bossAction;
      state.bossAction = 'idle';
      
      var alive = 0;
      for (var ai = 0; ai < state.raidParty.length; ai++) { if (!state.raidParty[ai].dead) alive++; }
      var tempo = alive < 5 ? 1.0 : alive < 8 ? 0.75 : 0.55;  
      var baseIdle = lastAction === 'kick' ? (2 + Math.random() * 2) : (3.5 + Math.random() * 2.5);
      state.bossIdleTimer = baseIdle * tempo;
      state.bossLungeX = 0;
      state.bossLungeY = 0;
      
      delete state._kickStartX;
      delete state._kickStartY;
      delete state._kickEndX;
      delete state._kickEndY;
      bossPickWanderTarget();
      state.bossWanderTimer = 1 + Math.random() * 2;
    }
  }
}



function bossStartTelegraph(attackType) {
  var bx = state.bossX;
  var by = state.bossY;
  var groundY = by + 280 * gameScale;

  if (attackType === 'stomp') {
    state.bossAction = 'telegraph_stomp';
    state.bossStompFrame = 0;  
    
    var cluster = findLargestHeroCluster();
    if (cluster) {
      state.telegraphX = cluster.x;
      state.telegraphY = cluster.y;
    } else {
      state.telegraphX = bx;
      state.telegraphY = groundY;
    }
    state.telegraphRadius = W * 0.22;
    state.bossActionTimer = 1.2;  
    state.telegraphTimer = 1.2;
    state.telegraphDur = 1.2;
  } else {
    state.bossAction = 'telegraph_blast';
    state.telegraphX = bx;
    state.telegraphY = by;
    state.telegraphRadius = W * 0.6;  
    state.bossActionTimer = 1.5;
    state.telegraphTimer = 1.5;
    state.telegraphDur = 1.5;
  }
  
  state.bossFocusX = state.telegraphX;
  state.bossFocusY = state.telegraphY;

  
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (h.dead) continue;
    h.fleeing = false;
    var dx = h.x - state.telegraphX;
    var dy = h.y - state.telegraphY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < state.telegraphRadius) {
      
      if (h.dodger) {
        h.fleeing = true;
        
        var fleeAngle = Math.atan2(dy || 1, dx || 1);
        var safeR = state.telegraphRadius + 40 + Math.random() * 60;
        h.wanderX = state.telegraphX + Math.cos(fleeAngle) * safeR;
        h.wanderY = state.telegraphY + Math.sin(fleeAngle) * safeR * 0.4;
        h.wanderX = Math.max(W * 0.05, Math.min(W * 0.95, h.wanderX));
        h.wanderY = Math.max(H * 0.5, Math.min(H * 0.78, h.wanderY));
        h.wanderSpeed = 80 + Math.random() * 40; 
        
        if (h.heroClass === 'support') {
          h.fleeWings = 1.5;
          h.wanderSpeed = 130 + Math.random() * 40; 
          
          h.wanderX = W * 0.15 + Math.random() * W * 0.7;
          h.wanderY = H * 0.68 + Math.random() * H * 0.08;
        }
      }
      
    }
  }
}

function fleeFromTelegraph(dt) {
  
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (!h.fleeing || h.dead) continue;
    var dx = h.wanderX - h.x;
    var dy = h.wanderY - h.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 20) {
      h.fleeing = false;
      h.wanderSpeed = HERO_WALK_SPEED; 
    }
  }
}

function spawnSpeechBubble(x, y, text, speaker) {
  state.speechBubbles.push({
    x: x + (Math.random() - 0.5) * 20,
    y: y - 60 - Math.random() * 20,
    offsetX: (Math.random() - 0.5) * 20,  
    offsetY: -60 - Math.random() * 20,
    text: text,
    timer: 4.0 + Math.random() * 1.0,
    duration: 4.0,
    speaker: speaker || null,  
  });
}

function bossDamageScale() {
  
  var phase = getPhase(state.hp);
  var phaseScales = [0.55, 0.7, 0.85, 1.0, 1.2]; 
  var phaseMult = phaseScales[phase.id - 1] || 1.0;

  
  
  var alive = 0;
  for (var i = 0; i < state.raidParty.length; i++) {
    if (!state.raidParty[i].dead) alive++;
  }
  var sizeMult;
  if (alive <= 2)      sizeMult = 1.6;  
  else if (alive <= 4) sizeMult = 1.3;  
  else if (alive <= 7) sizeMult = 1.0;  
  else                 sizeMult = 0.85; 

  return phaseMult * sizeMult;
}

function killHero(h) {
  h.hp = 0;
  h.dead = true;
  h.deathTimer = 20 + Math.random() * 10; 
  h.angelTimer = 2.5; 
  h.bodyX = h.x;
  h.bodyY = h.y;
  h.rezBy = null;
  h.rezTimer = 0;
  
  if (!h._kickAnim) h.dieFrame = 0;
  h.dieAnimDone = false;
  h.castAnim = null;
  h.castFrame = 0;
  h._pendingStreaks = null;
  h._hitAnim = false;
  h._hitFrame = 0;
  
  if (state.bossTargetHero === h) state.bossTargetHero = null;
  spawnBurst(h.x, h.y - 20, '#ff4444', 10, 3, 0.6);
  logCombat(h.name + ' has been slain!', '#ff4444');

  
  var aliveCount = 0;
  for (var ci = 0; ci < state.raidParty.length; ci++) { if (!state.raidParty[ci].dead) aliveCount++; }
  if (aliveCount < 5 && state.bossGloatCooldown <= 0) {
    var taunts = [
      'PATHETIC.', 'WHO\'S NEXT?', 'IS THAT ALL YOU\'VE GOT?',
      'DISAPPOINTING.', 'TOO EASY.', 'SEND MORE.',
      'LAUGHABLE.', 'YOU CALL THAT A FIGHT?', 'NEXT.',
      'YAWN.', 'I EXPECTED MORE.', 'TRY HARDER.'
    ];
    spawnSpeechBubble(state.bossX, state.bossY - 40, taunts[Math.floor(Math.random() * taunts.length)], state);
    state.bossGloatCooldown = 6 + Math.random() * 4;  
    logCombat('OUTRAGE: ' + taunts[Math.floor(Math.random() * taunts.length)], '#ff8844');
  }

  
  if (!state.bossDancing && state.bossDanceCooldown <= 0 && state.bossAction === 'idle') {
    if (aliveCount === 0 || (aliveCount <= 2 && Math.random() < 0.3)) {
      state.bossDancing = true;
      state.bossDanceDuration = 3 + Math.random() * 3; 
      state.bossDanceFrame = 0;
      state.bossDanceSpriteTimer = 0;
    }
  }
  
  for (var i = 0; i < state.raidParty.length; i++) {
    var other = state.raidParty[i];
    if (other === h || other.dead || other.speechCooldown > 0) continue;
    var dx = other.x - h.x;
    var dy = other.y - h.y;
    if (Math.sqrt(dx * dx + dy * dy) < W * 0.2 && Math.random() < 0.5) {
      var texts = ['LOL', 'F', 'RIP', 'oof', 'lmao', 'GG', 'noob'];
      spawnSpeechBubble(other.x, other.y, texts[Math.floor(Math.random() * texts.length)], other);
      other.speechCooldown = 8 + Math.random() * 4;
    }
  }
}

function findLargestHeroCluster() {
  var alive = [];
  for (var i = 0; i < state.raidParty.length; i++) {
    if (!state.raidParty[i].dead) alive.push(state.raidParty[i]);
  }
  if (alive.length === 0) return null;
  if (alive.length === 1) return { x: alive[0].x, y: alive[0].y };

  var clusterRadius = W * 0.18; 
  var bestIdx = 0, bestCount = 0;
  for (var i = 0; i < alive.length; i++) {
    var count = 0;
    for (var j = 0; j < alive.length; j++) {
      var dx = alive[i].x - alive[j].x, dy = alive[i].y - alive[j].y;
      if (Math.sqrt(dx * dx + dy * dy) < clusterRadius) count++;
    }
    if (count > bestCount) { bestCount = count; bestIdx = i; }
  }
  
  var cx = 0, cy = 0, n = 0;
  for (var j = 0; j < alive.length; j++) {
    var dx = alive[bestIdx].x - alive[j].x, dy = alive[bestIdx].y - alive[j].y;
    if (Math.sqrt(dx * dx + dy * dy) < clusterRadius) {
      cx += alive[j].x; cy += alive[j].y; n++;
    }
  }
  return { x: cx / n, y: cy / n };
}

function bossExecuteStomp() {
  logCombat('OUTRAGE casts Ground Slam!', '#ff6644');
  state.bossAction = 'stomp';
  state.bossActionTimer = 3.5;   
  state.bossActionDur = 3.5;
  state.telegraphTimer = 0;
  state._stompJetActive = false;  
  state._stompPeakReached = false;
  
  var cluster = findLargestHeroCluster();
  var footOff = 300 * gameScale;
  if (cluster) {
    
    state._stompLandX = cluster.x;
    state._stompLandY = cluster.y - footOff;
  } else {
    state._stompLandX = state.bossX;
    state._stompLandY = state.bossY;
  }
  state._stompStartX = state.bossX;
  state._stompStartY = state.bossY;
  
  for (var i = 0; i < state.raidParty.length; i++) {
    state.raidParty[i].fleeing = false;
    state.raidParty[i].wanderSpeed = HERO_WALK_SPEED;
  }
}

function bossExecuteBlast() {
  logCombat('OUTRAGE casts Megaphone Blast!', '#cc44ff');
  state.bossAction = 'blast';
  state.bossActionTimer = 1.2;
  state.bossActionDur = 1.2;
  state.bossBlastRadius = 0;
  state.telegraphTimer = 0;
  for (var i = 0; i < state.raidParty.length; i++) {
    state.raidParty[i].fleeing = false;
    state.raidParty[i].wanderSpeed = HERO_WALK_SPEED;
  }
}

function updateBossStomp(prog) {
  var scale = gameScale;
  var footOff = 300 * scale;
  var peakHeight = -550;  

  
  var landX = state._stompLandX || state.bossX;
  var landY = state._stompLandY || state.bossY;
  var startX = state._stompStartX || state.bossX;
  var startY = state._stompStartY || state.bossY;

  
  var bx = state.bossX;
  var by = state.bossY;
  var groundY = by + footOff;

  
  
  
  
  

  if (prog < 0.08) {
    
    var crouchProg = prog / 0.08;
    state.bossLungeY = -80 + 30 * crouchProg;  
    state._stompJetActive = crouchProg > 0.5;
    
    if (crouchProg > 0.3 && Math.random() < 0.5) {
      spawnParticle(
        bx + (Math.random() - 0.5) * 60, groundY,
        '#ff8800', (Math.random() - 0.5) * 3, -1 - Math.random() * 2,
        0.2 + Math.random() * 0.15, 2 + Math.random() * 2
      );
    }

  } else if (prog < 0.40) {
    
    var ascentProg = (prog - 0.08) / 0.32;
    
    var eased = ascentProg * ascentProg * ascentProg;
    state.bossLungeY = -50 + (peakHeight + 50) * eased;
    state._stompJetActive = true;

    
    var driftProg = Math.min(1, ascentProg * 0.4); 
    state.bossX = startX + (landX - startX) * driftProg;
    state.bossY = startY + (landY - startY) * driftProg;
    bx = state.bossX; by = state.bossY;
    groundY = by + footOff;

    
    var jetIntensity = 0.2 + ascentProg * 0.8;
    var jetY = by + state.bossLungeY + 360 * scale;  
    
    var particleCount = Math.ceil(3 + 5 * jetIntensity);
    for (var ji = 0; ji < particleCount; ji++) {
      
      var flameColors = ascentProg < 0.3
        ? ['#ff4400', '#ff8800', '#ffee44']         
        : ['#ffffff', '#ffee44', '#ff8800', '#ff4400']; 
      var flameColor = flameColors[Math.floor(Math.random() * flameColors.length)];
      var spread = 30 + ascentProg * 30; 
      spawnParticle(
        bx + (Math.random() - 0.5) * spread * scale, jetY + Math.random() * 20,
        flameColor, (Math.random() - 0.5) * (3 + ascentProg * 3), 4 + Math.random() * 8 + ascentProg * 4,
        0.15 + Math.random() * 0.2, 3 + Math.random() * 5 + ascentProg * 3
      );
    }
    
    if (Math.random() < 0.4 + ascentProg * 0.5) {
      var smokeX = bx + (Math.random() - 0.5) * (80 + ascentProg * 60) * scale;
      spawnParticle(
        smokeX, groundY - Math.random() * 20,
        Math.random() < 0.5 ? '#888888' : '#666655',
        (Math.random() - 0.5) * 6, -2 - Math.random() * 3,
        0.8 + Math.random() * 0.6, 8 + Math.random() * 12
      );
    }
    
    state.shakeTimer = Math.max(state.shakeTimer, 0.03 + ascentProg * 0.05);

  } else if (prog < 0.55) {
    
    var hoverProg = (prog - 0.40) / 0.15;
    state.bossLungeY = peakHeight;
    state._stompJetActive = true;
    state._stompPeakReached = true;

    
    var driftProg = 0.4 + hoverProg * 0.6; 
    state.bossX = startX + (landX - startX) * driftProg;
    state.bossY = startY + (landY - startY) * driftProg;
    bx = state.bossX; by = state.bossY;
    groundY = by + footOff;

    
    var jetY = by + peakHeight + 360 * scale;
    if (Math.random() < 0.6) {
      spawnParticle(
        bx + (Math.random() - 0.5) * 40 * scale, jetY,
        Math.random() < 0.3 ? '#ffffff' : '#ff8800',
        (Math.random() - 0.5) * 3, 3 + Math.random() * 5,
        0.15 + Math.random() * 0.15, 3 + Math.random() * 4
      );
    }
    
    if (Math.random() < 0.4) {
      spawnParticle(
        bx + (Math.random() - 0.5) * 160 * scale, groundY + (Math.random() - 0.5) * 20,
        Math.random() < 0.5 ? '#999999' : '#777766',
        (Math.random() - 0.5) * 4, -1 - Math.random() * 2,
        1.0 + Math.random() * 0.8, 10 + Math.random() * 15
      );
    }

  } else if (prog < 0.68) {
    
    var slamProg = (prog - 0.55) / 0.13;
    var slamEase = slamProg * slamProg;  
    state.bossLungeY = peakHeight + (-peakHeight + 40) * slamEase;  
    state._stompJetActive = false;

    
    state.bossX = landX;
    state.bossY = landY;
    bx = state.bossX; by = state.bossY;
    groundY = by + footOff;

    if (slamProg > 0.85 && state.shakeTimer < 0.1) {
      
      state.shakeTimer = 0.8;  

      
      for (var i = 0; i < 20; i++) {
        var angle = Math.random() * Math.PI * 2;
        spawnParticle(
          bx + (Math.random() - 0.5) * 100, groundY,
          Math.random() < 0.5 ? '#4a3060' : '#665544',
          Math.cos(angle) * (3 + Math.random() * 5), -2 - Math.random() * 4,
          0.6 + Math.random() * 0.4, 3 + Math.random() * 5
        );
      }
      
      for (var di = 0; di < 16; di++) {
        var da = (Math.PI * 2 / 16) * di;
        spawnParticle(
          bx + Math.cos(da) * 40, groundY,
          '#aa9977', Math.cos(da) * (6 + Math.random() * 4), -1 + Math.sin(da) * 2,
          0.5 + Math.random() * 0.3, 4 + Math.random() * 3
        );
      }

      
      for (var j = 0; j < state.raidParty.length; j++) {
        var h = state.raidParty[j];
        if (h.dead || h._kicked) continue;
        var dx = h.x - bx;
        var dy = h.y - groundY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < W * 0.25) {
          
          var baseDmg = h.heroClass === 'tank' ? 25 : h.heroClass === 'dps' ? 40 : 30;
          var dmg = Math.round(baseDmg * bossDamageScale());
          if (h.shieldTimer > 0) { dmg = Math.round(dmg * 0.6); h.shieldTimer = 0; }
          h.hp = Math.max(0, h.hp - dmg);
          if (h.hp <= 0) {
            killHero(h);
          } else {
            
            h._kicked = true;
            h._kickAnim = true;
            h.dieFrame = 0;
            h.castAnim = null; h.castFrame = 0; h._pendingStreaks = null;
            var knockAngle = Math.atan2(dy, dx);
            
            var knockDist = W * 0.08 + Math.random() * W * 0.05;
            
            var distFactor = 1 - (dist / (W * 0.25));
            knockDist *= (0.6 + distFactor * 0.8);
            h._kickStartX = h.x;
            h._kickStartY = h.y;
            h._kickEndX = Math.max(W * 0.02, Math.min(W * 0.98, h.x + Math.cos(knockAngle) * knockDist));
            h._kickEndY = Math.max(H * 0.3, Math.min(H * 0.88, h.y + Math.abs(Math.sin(knockAngle)) * knockDist * 0.3 + knockDist * 0.15));
            h._kickArcTimer = 0;
            h._kickArcDur = 0.4;  
          }
          logCombat('OUTRAGE slams ' + h.name + '!', '#ff6644');
        }
      }
    }

  } else {
    
    var recov = (prog - 0.68) / 0.32;
    
    var bounce = 40 * (1 - recov) * Math.cos(recov * Math.PI * 1.5);
    state.bossLungeY = bounce;
    state._stompJetActive = false;
    
    if (recov < 0.3 && Math.random() < 0.3) {
      spawnParticle(
        bx + (Math.random() - 0.5) * 80, groundY,
        '#887766', (Math.random() - 0.5) * 2, -1 - Math.random(),
        0.3 + Math.random() * 0.2, 3 + Math.random() * 3
      );
    }
  }

  
  state.bossWanderX = state.bossX;
  state.bossWanderY = state.bossY;
}

function bossFarthestAliveHero() {
  var best = null, bestDist = 0;
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (h.dead) continue;
    var dx = h.x - state.bossX, dy = h.y - state.bossY;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > bestDist) { bestDist = d; best = h; }
  }
  return best;
}

function bossStartCharge() {
  var target = bossFarthestAliveHero();
  if (!target) { state.bossIdleTimer = 2; return; }
  bossSetTarget(target);
  state._chargeTarget = target;  
  
  state.bossChargeStartX = state.bossX;
  state.bossChargeStartY = state.bossY;
  
  
  var footOff = 300 * gameScale;
  var aimX = target.x;
  var aimY = target.y - footOff;  
  var dx = aimX - state.bossX, dy = aimY - state.bossY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) dist = 1;
  state.bossChargeTargetX = aimX + (dx / dist) * dist * 0.15;
  state.bossChargeTargetY = aimY + (dy / dist) * dist * 0.15;
  state.bossChargeSpeed = 0;
  
  state.bossAction = 'telegraph_charge';
  state.bossActionTimer = 1.0;
  state.telegraphDur = 1.0;
  logCombat('OUTRAGE winds up — STEAM ROLLER!', '#ff6600');
}

function bossExecuteCharge() {
  
  state.bossChargeStartX = state.bossX;
  state.bossChargeStartY = state.bossY;
  state.bossAction = 'charge';
  state.bossActionTimer = 2.5;
  state.bossActionDur = 2.5;
  state._chargeHit = {};
  logCombat('OUTRAGE charges!', '#ff6600');
}

function updateBossCharge(prog, dt) {
  
  
  
  var sx = state.bossChargeStartX, sy = state.bossChargeStartY;
  var tx = state.bossChargeTargetX, ty = state.bossChargeTargetY;
  var cdx = tx - sx, cdy = ty - sy;
  var totalDist = Math.sqrt(cdx * cdx + cdy * cdy);

  
  state.bossFaceX = cdx > 0 ? 1 : -1;
  state.bossMoveRight = cdx > 0;
  var cabsX = Math.abs(cdx), cabsY = Math.abs(cdy);
  var cratio = cabsY > 0.1 ? cabsX / cabsY : 999;
  if (cdy < -2 && cratio < 0.4) state.bossMoveDir = 'up';
  else if (cdy < -2 && cratio < 4.0) state.bossMoveDir = 'up-diag';
  else if (cratio >= 4.0) state.bossMoveDir = 'side';
  else if (cdy > 2 && cratio >= 0.4) state.bossMoveDir = 'down-diag';
  else state.bossMoveDir = 'down';

  if (prog < 0.15) {
    
    var wp = prog / 0.15;
    state.bossLungeY = -15 * wp;  
    state.bossX = sx + cdx * wp * 0.03;
    state.bossY = sy + cdy * wp * 0.03;
    state.bossChargeSpeed = state.bossSpeed * 0.3;
  } else if (prog < 0.85) {
    
    var chargeProg = (prog - 0.15) / 0.7;
    var easedProg = chargeProg * chargeProg;  
    var moveProg = 0.03 + easedProg * 0.92;
    state.bossX = sx + cdx * moveProg;
    state.bossY = sy + cdy * moveProg;
    state.bossLungeY = 0;
    state.bossChargeSpeed = state.bossSpeed * (0.5 + chargeProg * 2.0);
    
    state.bossWalkCycle += dt * (4 + chargeProg * 8);
    state.bossMoving = true;

    
    
    var crushRadius = W * 0.08;
    var chargeFootY = bossFootY(); 
    for (var i = 0; i < state.raidParty.length; i++) {
      if (state._chargeHit[i]) continue;
      var h = state.raidParty[i];
      if (h.dead || h._kicked) continue;
      var hdx = h.x - state.bossX, hdy = h.y - chargeFootY;
      var hd = Math.sqrt(hdx * hdx + hdy * hdy);
      if (hd < crushRadius) {
        state._chargeHit[i] = true;
        
        h._kicked = true;
        h._kickAnim = true;
        h.dieFrame = 0;
        h.castAnim = null; h.castFrame = 0; h._pendingStreaks = null;
        var knockAngle = Math.atan2(hdy, hdx);
        var knockDist = W * 0.15 + Math.random() * W * 0.1;
        h._kickStartX = h.x;
        h._kickStartY = h.y;
        h._kickEndX = Math.max(W * 0.02, Math.min(W * 0.98, h.x + Math.cos(knockAngle) * knockDist));
        h._kickEndY = Math.max(H * 0.4, Math.min(H * 0.88, h.y + Math.abs(Math.sin(knockAngle)) * knockDist * 0.4 + knockDist * 0.2));
        h._kickArcTimer = 0;
        h._kickArcDur = 0.5;
        
        var baseDmg = h.heroClass === 'tank' ? 15 : h.heroClass === 'dps' ? 30 : 20;
        var dmg = Math.round(baseDmg * bossDamageScale());
        if (h.shieldTimer > 0) { dmg = Math.round(dmg * 0.6); h.shieldTimer = 0; }
        h.hp = Math.max(0, h.hp - dmg);
        if (h.hp <= 0) killHero(h);
        state.shakeTimer = Math.max(state.shakeTimer, 0.15);
        logCombat('OUTRAGE steamrolls ' + h.name + '!', '#ff6600');
      }
    }
  } else {
    
    var skidProg = (prog - 0.85) / 0.15;
    state.bossX = sx + cdx * (0.95 + skidProg * 0.05);
    state.bossY = sy + cdy * (0.95 + skidProg * 0.05);
    state.bossChargeSpeed = state.bossSpeed * 2.5 * (1 - skidProg);
    state.bossMoving = skidProg < 0.5;
    
    if (Math.random() < 0.4) {
      spawnParticle(
        state.bossX + (Math.random() - 0.5) * 40,
        state.bossY + 280 * gameScale,
        '#8B7355', (Math.random() - 0.5) * 3, -1 - Math.random() * 2,
        0.4 + Math.random() * 0.3, 2 + Math.random() * 3
      );
    }
  }
  
  state.bossWanderX = state.bossX;
  state.bossWanderY = state.bossY;
}

function bossFootY() {
  var frame = (state.bossIdleFrame || 0) % IDLE_SPRITE_FRAMES;
  var bb = getBB('boss-idle-down', frame);
  
  if (bb) return state.bossY + bb.footY * gameScale;
  return state.bossY + 250 * gameScale;
}
function bossKickRange() { return W * 0.12; }

function bossHasKickTarget() {
  var bx = state.bossX;
  var fy = bossFootY();
  var range = bossKickRange();
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (h.dead) continue;
    var dx = h.x - bx;
    var dy = h.y - fy;
    if (Math.sqrt(dx * dx + dy * dy) < range) return true;
  }
  return false;
}

function bossStartKick() {
  
  
  var bx = state.bossX;
  var fy = bossFootY();
  var range = bossKickRange();
  var closestTank = -1;
  var closestTankDist = Infinity;
  var closestAny = -1;
  var closestAnyDist = Infinity;
  for (var i = 0; i < state.raidParty.length; i++) {
    var h = state.raidParty[i];
    if (h.dead) continue;
    var dx = h.x - bx;
    var dy = h.y - fy;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > range) continue;  
    if (d < closestAnyDist) { closestAnyDist = d; closestAny = i; }
    if (h.heroClass === 'tank' && d < closestTankDist) { closestTankDist = d; closestTank = i; }
  }
  
  var target = -1;
  if (closestTank !== -1 && Math.random() < 0.8) {
    target = closestTank;
  } else {
    target = closestAny;
  }
  if (target === -1) { state.bossIdleTimer = 2; return; }
  state.bossKickTarget = target;
  state.bossAction = 'kick';
  state.bossKickFrame = 0;       
  
  var kickedHeroCheck = state.raidParty[target];
  state.bossKickUp = kickedHeroCheck && kickedHeroCheck.y < state.bossY + 140 * (gameScale);
  state.bossActionTimer = 1.5;   
  state.bossActionDur = 1.5;
  var kickedHero = state.raidParty[target];
  
  if (kickedHero) {
    bossSetTarget(kickedHero);
    state.bossFocusX = kickedHero.x;
    state.bossFocusY = kickedHero.y;
  }
  if (kickedHero) logCombat('OUTRAGE kicks ' + kickedHero.name + '!', '#ee8822');
}

function updateBossKick(prog, dt) {
  var bx = state.bossX;
  var by = state.bossY;
  var scale = gameScale;
  var footY = bossFootY(); 
  var target = state.raidParty[state.bossKickTarget];
  if (!target) return;

  
  if (!state._kickStartX) {
    state._kickStartX = target.x;
    state._kickStartY = target.y;
    
    var angle = Math.atan2(target.y - footY, target.x - bx);
    var kickDist = W * 0.35 + Math.random() * W * 0.15;
    state._kickEndX = bx + Math.cos(angle) * kickDist;
    state._kickEndY = footY + Math.sin(angle) * kickDist * 0.4;
    state._kickEndX = Math.max(W * 0.02, Math.min(W * 0.98, state._kickEndX));
    state._kickEndY = Math.max(H * 0.5, Math.min(H * 0.85, state._kickEndY));
  }

  var angle = Math.atan2(target.y - footY, target.x - bx);

  if (prog < 0.3) {
    
    var lungeProg = prog / 0.3;
    state.bossLungeX = Math.cos(angle) * 40 * lungeProg;
    state.bossLungeY = Math.sin(angle) * 20 * lungeProg;
  } else if (prog < 0.6) {
    
    if (!target._kicked) {
      target._kicked = true;
      target._hitAnim = true;
      target._hitFrame = 0;
      target.castAnim = null;
      target.castFrame = 0;
      target._pendingStreaks = null;
      
      var baseKickDmg = target.heroClass === 'tank' ? 20 : target.heroClass === 'dps' ? 35 : 25;
      var kickDmg = Math.round(baseKickDmg * bossDamageScale());
      
      if (target.shieldTimer > 0) { kickDmg = Math.round(kickDmg * 0.6); target.shieldTimer = 0; }
      target.hp = Math.max(0, target.hp - kickDmg);
      if (target.hp <= 0) killHero(target);
      spawnBurst(target.x, target.y - 15, C.red, 8, 3, 0.5);
      state.shakeTimer = 0.15;
    }
    if (prog < 0.38) {
      
      var hitProg = (prog - 0.3) / 0.08;
      target._hitFrame = hitProg * 10;
    } else {
      
      if (target._hitAnim) {
        target._hitAnim = false;
        target._kickAnim = true;
        target.dieFrame = 0;
      }
      
      var arcProg = (prog - 0.38) / 0.22;
      var sx = state._kickStartX, sy = state._kickStartY;
      var ex = state._kickEndX, ey = state._kickEndY;
      
      target.x = sx + (ex - sx) * arcProg;
      target.y = sy + (ey - sy) * arcProg - Math.sin(arcProg * Math.PI) * 120;
      
      target.dieFrame = arcProg * 22;
      if (target.dead) {
        target.bodyX = target.x;
        target.bodyY = target.y;
      }
    }
  } else {
    
    var recov = (prog - 0.6) / 0.4;
    state.bossLungeX = Math.cos(angle) * 40 * (1 - recov);
    state.bossLungeY = Math.sin(angle) * 20 * (1 - recov);
    
    if (target._kicked) {
      target.x = state._kickEndX;
      target.y = state._kickEndY;
      if (target.dead) {
        target.bodyX = target.x;
        target.bodyY = target.y;
        
        target._kickAnim = false;
      } else {
        
        target._kickRecoverTimer = 0.7;
        target.dieFrame = 22;
        var nw = randomWanderTarget(target.heroClass);
        target.wanderX = nw.x;
        target.wanderY = nw.y;
      }
      delete target._kicked;
      delete state._kickStartX;
      delete state._kickStartY;
      delete state._kickEndX;
      delete state._kickEndY;
    }
  }
}

function bossStartBlast() {
  state.bossAction = 'blast';
  state.bossActionTimer = 1.2;
  state.bossActionDur = 1.2;
  state.bossBlastRadius = 0;
}

function updateBossBlast(prog) {
  var bx = state.bossX;
  var by = state.bossY;
  if (prog < 0.25) {
    
    state.bossLungeY = Math.sin(prog * 40) * 3;
  } else if (prog < 0.4) {
    
    var blastProg = (prog - 0.25) / 0.15;
    state.bossBlastRadius = blastProg * W * 0.6;
    if (blastProg < 0.2) {
      state.shakeTimer = 0.3;
      state.flashTimer = 0.15;
    }
    
    if (blastProg > 0.1 && blastProg < 0.3) {
      for (var i = 0; i < state.raidParty.length; i++) {
        var h = state.raidParty[i];
        if (h.dead) continue;
        var dx = h.x - bx;
        var dy = h.y - by;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        h.x += (dx / dist) * 50;
        h.y += (dy / dist) * 20 + 15;
        h.x = Math.max(W * 0.03, Math.min(W * 0.97, h.x));
        h.y = Math.max(H * 0.5, Math.min(H * 0.78, h.y));
        var nw = randomWanderTarget(h.heroClass);
        h.wanderX = nw.x;
        h.wanderY = nw.y;
        
        if (!h._blastHit) {
          h._blastHit = true;
          var baseBlastDmg = h.heroClass === 'tank' ? 20 : h.heroClass === 'dps' ? 35 : 25;
          var blastDmg = Math.round(baseBlastDmg * bossDamageScale());
          
          if (h.shieldTimer > 0) { blastDmg = Math.round(blastDmg * 0.6); h.shieldTimer = 0; }
          h.hp = Math.max(0, h.hp - blastDmg);
          if (h.hp <= 0) killHero(h);
          else { h._hitAnim = true; h._hitFrame = Math.random() * 3; h.castAnim = null; h.castFrame = 0; h._pendingStreaks = null; }
        }
      }
    }
    
    if (blastProg >= 0.3) {
      for (var j = 0; j < state.raidParty.length; j++) {
        if (state.raidParty[j]._blastHit) delete state.raidParty[j]._blastHit;
      }
    }
  } else {
    
    state.bossBlastRadius = W * 0.6 + (prog - 0.4) * W * 0.3;
  }
  state.bossLungeY *= 0.95;
}



function drawTargetLine(t) {
  if (state.bossTargetLineTimer <= 0 || !state.bossTargetHero) return;
  var hero = state.bossTargetHero;
  if (hero.dead) return;

  var prog = state.bossTargetLineTimer / state.bossTargetLineDur;  
  var alpha = prog < 0.3 ? prog / 0.3 : 1;  
  alpha *= 0.5 + Math.sin(t * 0.012) * 0.15;  

  var bx = state.bossX + state.bossLungeX;
  var by = state.bossY + state.bossLungeY;
  var scale = gameScale;
  var bossFootY = by + 200 * scale;

  
  var heroS = hero.drawScale ? hero.drawScale * Math.min(W, H) / 1000 : scale;
  var reticleCenter = hero.y - 93 * heroS;

  
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 3;
  ctx.setLineDash([12, 8]);
  ctx.lineDashOffset = -t * 0.05;  
  ctx.beginPath();
  ctx.moveTo(bx, bossFootY);
  ctx.lineTo(hero.x, reticleCenter);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.setLineDash([]);

  
  var reticleR = 30 + Math.sin(t * 0.01) * 5;
  var reticleR = 30 + Math.sin(t * 0.01) * 5;
  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(hero.x, reticleCenter, reticleR, 0, Math.PI * 2);
  ctx.stroke();

  
  var cLen = 8;
  ctx.beginPath();
  ctx.moveTo(hero.x - reticleR - cLen, reticleCenter);
  ctx.lineTo(hero.x - reticleR + cLen, reticleCenter);
  ctx.moveTo(hero.x + reticleR - cLen, reticleCenter);
  ctx.lineTo(hero.x + reticleR + cLen, reticleCenter);
  ctx.moveTo(hero.x, reticleCenter - reticleR - cLen);
  ctx.lineTo(hero.x, reticleCenter - reticleR + cLen);
  ctx.moveTo(hero.x, reticleCenter + reticleR - cLen);
  ctx.lineTo(hero.x, reticleCenter + reticleR + cLen);
  ctx.stroke();

  
  ctx.fillStyle = '#ff4466';
  ctx.font = 'bold ' + Math.round(14 * scale) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TARGET: ' + hero.name, hero.x, reticleCenter - reticleR - 12);

  ctx.restore();
}

function drawTelegraph(t) {
  if (state.bossAction !== 'telegraph_stomp' && state.bossAction !== 'telegraph_blast' && state.bossAction !== 'telegraph_charge') return;

  
  if (state.bossAction === 'telegraph_charge') {
    var chProg = 1 - (state.bossActionTimer / state.telegraphDur);
    var chPulse = 0.4 + Math.sin(t * 0.02) * 0.2 + chProg * 0.3;
    var footOff = 300 * gameScale;
    var sx = state.bossX, sy = state.bossY + footOff;
    var ex = state.bossChargeTargetX, ey = state.bossChargeTargetY + footOff;
    var cdx = ex - sx, cdy = ey - sy;
    var cLen = Math.sqrt(cdx * cdx + cdy * cdy);
    var perpX = -cdy / cLen, perpY = cdx / cLen;
    var pathWidth = W * 0.06;

    ctx.save();
    
    ctx.globalAlpha = chPulse * 0.3;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(sx + perpX * pathWidth, sy + perpY * pathWidth);
    ctx.lineTo(ex + perpX * pathWidth, ey + perpY * pathWidth);
    ctx.lineTo(ex - perpX * pathWidth, ey - perpY * pathWidth);
    ctx.lineTo(sx - perpX * pathWidth, sy - perpY * pathWidth);
    ctx.closePath();
    ctx.fill();
    
    ctx.globalAlpha = chPulse * 0.6;
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 3;
    ctx.setLineDash([12, 8]);
    ctx.beginPath();
    ctx.moveTo(sx + perpX * pathWidth, sy + perpY * pathWidth);
    ctx.lineTo(ex + perpX * pathWidth, ey + perpY * pathWidth);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx - perpX * pathWidth, sy - perpY * pathWidth);
    ctx.lineTo(ex - perpX * pathWidth, ey - perpY * pathWidth);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.globalAlpha = chPulse * 0.5;
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + cdx * chProg, sy + cdy * chProg);
    ctx.stroke();
    
    ctx.globalAlpha = chPulse * 0.7;
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STEAM ROLLER', (sx + ex) / 2, (sy + ey) / 2 - 15);
    ctx.restore();
    return;
  }

  var prog = 1 - (state.bossActionTimer / state.telegraphDur);
  var pulse = 0.3 + Math.sin(t * 0.015) * 0.15 + prog * 0.3;
  var tx = state.telegraphX;
  var ty = state.telegraphY;
  var tr = state.telegraphRadius;

  ctx.save();

  if (state.bossAction === 'telegraph_stomp') {
    
    ctx.globalAlpha = pulse * 0.35;
    ctx.fillStyle = '#ff2200';
    ctx.beginPath();
    ctx.ellipse(tx, ty, tr, tr * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    
    ctx.globalAlpha = pulse * 0.6;
    ctx.strokeStyle = '#ff4422';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(tx, ty, tr, tr * 0.3, 0, 0, Math.PI * 2);
    ctx.stroke();

    
    ctx.globalAlpha = pulse * 0.2;
    ctx.fillStyle = '#ff6644';
    ctx.beginPath();
    ctx.ellipse(tx, ty, tr * prog, tr * prog * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    
    ctx.globalAlpha = pulse * 0.25;
    ctx.fillStyle = '#cc44ff';
    ctx.beginPath();
    ctx.arc(tx, ty, tr, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = pulse * 0.5;
    ctx.strokeStyle = '#dd66ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(tx, ty, tr, 0, Math.PI * 2);
    ctx.stroke();

    
    ctx.globalAlpha = pulse * 0.3;
    ctx.strokeStyle = '#ff44ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(tx, ty, tr * (1 - prog), 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawSpeechBubbles(t) {
  for (var i = state.speechBubbles.length - 1; i >= 0; i--) {
    var b = state.speechBubbles[i];
    b.timer -= 1 / 60; 
    if (b.timer <= 0) {
      state.speechBubbles.splice(i, 1);
      continue;
    }

    var life = b.timer / b.duration;
    
    var bx = b.x;
    var by = b.y;
    if (b.speaker) {
      bx = (b.speaker.bossX !== undefined ? b.speaker.bossX : b.speaker.x) + b.offsetX;
      by = (b.speaker.bossY !== undefined ? b.speaker.bossY : b.speaker.y) + b.offsetY;
    }

    
    var floatY = by - (1 - life) * 25;

    var s = Math.min(W, H) / 1000;
    var fontSize = Math.round(22 * s);
    if (fontSize < 12) fontSize = 12;

    ctx.save();
    ctx.globalAlpha = life;
    ctx.font = 'bold ' + fontSize + 'px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';

    
    var metrics = ctx.measureText(b.text);
    var bw = metrics.width + 10;
    var bh = fontSize + 6;

    
    if (floatY - bh < 8) floatY = 8 + bh;
    bx = Math.max(bw / 2 + 8, Math.min(W - bw / 2 - 8, bx));

    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    roundRect(ctx, bx - bw / 2, floatY - bh, bw, bh, 4);
    ctx.fill();

    
    ctx.beginPath();
    ctx.moveTo(bx - 4, floatY);
    ctx.lineTo(bx + 4, floatY);
    ctx.lineTo(bx, floatY + 5);
    ctx.closePath();
    ctx.fill();

    
    ctx.fillStyle = '#222';
    ctx.fillText(b.text, bx, floatY - 3);

    ctx.restore();
  }
}

var COMBAT_LOG_MAX = 8;
var COMBAT_LOG_LIFE = 6; 

function logCombat(text, color) {
  state.combatLog.push({ text: text, color: color || '#ccc', timer: COMBAT_LOG_LIFE });
  if (state.combatLog.length > COMBAT_LOG_MAX) state.combatLog.shift();
}

function updateCombatLog(dt) {
  for (var i = state.combatLog.length - 1; i >= 0; i--) {
    state.combatLog[i].timer -= dt;
    if (state.combatLog[i].timer <= 0) state.combatLog.splice(i, 1);
  }
}

function drawCombatLog() {
  if (state.combatLog.length === 0) return;
  var logFontSize = Math.max(9, Math.round(11 * W / 1200));
  var lineH = logFontSize + 4;
  var logX = W - 16;
  
  var barBottom = H * 0.75 + 36 + 16; 
  var taglineY = H - 14;
  var logBottom = taglineY - 8;

  ctx.save();
  ctx.font = logFontSize + 'px monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';

  for (var i = state.combatLog.length - 1; i >= 0; i--) {
    var entry = state.combatLog[i];
    var idx = state.combatLog.length - 1 - i; 
    var y = logBottom - idx * lineH;
    if (y < barBottom) break; 

    
    var alpha = entry.timer < 1.5 ? entry.timer / 1.5 : 1;
    ctx.globalAlpha = alpha * 0.85;

    
    var tw = ctx.measureText(entry.text).width + 12;
    ctx.fillStyle = 'rgba(10,5,30,0.6)';
    roundRect(ctx, logX - tw, y - logFontSize - 1, tw + 4, logFontSize + 4, 3);
    ctx.fill();

    
    ctx.fillStyle = entry.color;
    ctx.fillText(entry.text, logX, y);
  }
  ctx.restore();
}

function drawBossAction(t) {
  var bx = state.bossX;
  var by = state.bossY;

  
  if (state.bossAction === 'stomp') {
    var prog = 1 - (state.bossActionTimer / state.bossActionDur);
    if (prog > 0.4 && prog < 0.9) {
      var crackAlpha = 1 - ((prog - 0.4) / 0.5);
      ctx.save();
      ctx.globalAlpha = crackAlpha * 0.6;
      ctx.strokeStyle = '#8866aa';
      ctx.lineWidth = 2;
      
      for (var i = 0; i < 6; i++) {
        var a = (Math.PI * 2 / 6) * i + 0.3;
        var len = 30 + (prog - 0.4) * 200;
        ctx.beginPath();
        var groundY = by + 280 * gameScale;
        ctx.moveTo(bx + state.bossLungeX, groundY);
        ctx.lineTo(bx + state.bossLungeX + Math.cos(a) * len, groundY + Math.sin(a) * len * 0.3);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  
  if (state.bossAction === 'kick') {
    var prog = 1 - (state.bossActionTimer / state.bossActionDur);
    var target = state.raidParty[state.bossKickTarget];
    var footScale = gameScale;
    var footX = bx + state.bossLungeX;
    var footY = by + 250 * footScale; 
    if (target && prog > 0.25 && prog < 0.7) {
      var swooshAlpha = 1 - ((prog - 0.25) / 0.45);
      ctx.save();
      ctx.globalAlpha = swooshAlpha * 0.7;
      ctx.strokeStyle = C.red;
      ctx.lineWidth = 4;
      ctx.shadowColor = C.red;
      ctx.shadowBlur = 12;
      
      ctx.beginPath();
      ctx.moveTo(footX, footY);
      ctx.quadraticCurveTo(
        (footX + target.x) / 2, Math.min(footY, target.y) - 50,
        target.x, target.y - 15
      );
      ctx.stroke();
      ctx.restore();
    }
  }

  
  if (state.bossAction === 'blast' && state.bossBlastRadius > 0) {
    var prog = 1 - (state.bossActionTimer / state.bossActionDur);
    var ringAlpha = prog < 0.5 ? 0.5 : 0.5 * (1 - (prog - 0.5) / 0.5);
    if (ringAlpha > 0.01) {
      ctx.save();
      ctx.globalAlpha = ringAlpha;
      ctx.strokeStyle = '#cc88ff';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#cc88ff';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(bx, by, state.bossBlastRadius, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.globalAlpha = ringAlpha * 0.3;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(bx, by, state.bossBlastRadius * 0.85, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = text.split(' ');
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line, x, y);
      line = words[i] + ' ';
      y += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}



var lastTime = 0;

function gameLoop(timestamp) {
  try {
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  state.time = timestamp;
  
  perfFrameTimes.push(dt);
  if (perfFrameTimes.length > 60) perfFrameTimes.shift();
  if (perfFrameTimes.length >= 20) {
    var avgDt = 0;
    for (var fi = 0; fi < perfFrameTimes.length; fi++) avgDt += perfFrameTimes[fi];
    avgDt /= perfFrameTimes.length;
    if (avgDt > 0.025) perfShadow = Math.max(0, perfShadow - 0.05);
    else if (avgDt < 0.018) perfShadow = Math.min(1, perfShadow + 0.02);
  }

  
  if (state.attackTimer > 0) {
    state.attackTimer -= dt;
    if (state.attackTimer <= 0) {
      state.scene = 'idle';
      state.attackTimer = 0;
    }
  }
  if (state.announceTimer > 0) state.announceTimer -= dt;
  if (state.shakeTimer > 0) state.shakeTimer -= dt;
  if (state.flashTimer > 0) state.flashTimer -= dt;
  if (state.bossHitTimer > 0) state.bossHitTimer -= dt;
  if (state.bossBlendTimer > 0) state.bossBlendTimer -= dt;
  if (state.challengerEnterTimer > 0) {
    state.challengerEnterTimer -= dt;
    if (state.challengerEnterTimer <= 0) {
      state.challenger = null;
    }
  }
  if (state.phaseShiftTimer > 0) {
    state.phaseShiftTimer -= dt;
    if (state.phaseShiftTimer <= 0) state.scene = 'idle';
  }

  
  updateRaidParty(dt, timestamp);

  
  updateBossAI(dt);

  
  updateCombatLog(dt);

  
  if (Math.random() < 0.15) spawnSteam();  

  
  for (var i = state.particles.length - 1; i >= 0; i--) {
    var p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02; 
    p.life -= dt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
  for (var j = state.steamParticles.length - 1; j >= 0; j--) {
    var sp = state.steamParticles[j];
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.life -= dt * 0.3;
    sp.size += 0.3;
    if (sp.life <= 0) state.steamParticles.splice(j, 1);
  }

  
  
  ctx.clearRect(0, 0, W, H);

  
  drawBackground(timestamp);

  
  ctx.save();
  if (state.shakeTimer > 0) {
    var shake = state.shakeTimer * 8;
    ctx.translate(
      (Math.random()-0.5) * shake,
      (Math.random()-0.5) * shake
    );
  }

  
  var camCX = W * 0.5;
  var camCY = H * 0.45;
  ctx.translate(camCX, camCY);
  ctx.scale(state.cam.zoom, state.cam.zoom);
  ctx.translate(-camCX - state.cam.panX, -camCY - state.cam.panY);

  
  for (var k = 0; k < state.steamParticles.length; k++) {
    var stm = state.steamParticles[k];
    ctx.beginPath();
    ctx.arc(stm.x, stm.y, stm.size, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(180,160,220,' + (stm.life * stm.alpha) + ')';
    ctx.fill();
  }

  
  drawTelegraph(timestamp);

  
  drawTargetLine(timestamp);

  
  drawRaidParty(timestamp, true);

  
  ctx.save();
  ctx.translate(state.bossLungeX, state.bossLungeY);
  var hitOff = state.bossHitTimer > 0 ? Math.sin(state.bossHitTimer * 30) * 10 : 0;
  drawBoss(timestamp, hitOff);
  ctx.restore();

  
  drawBossNameplate(timestamp);

  
  drawBossAction(timestamp);

  
  drawRaidParty(timestamp, false);

  

  
  drawBattleStreaks(timestamp);

  
  for (var m = 0; m < state.particles.length; m++) {
    var pp = state.particles[m];
    var pa = pp.life / pp.maxLife;
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, pp.size * pa, 0, Math.PI*2);
    ctx.fillStyle = pp.color.replace(')', ',' + pa + ')').replace('rgb', 'rgba');
    
    if (pp.color.startsWith('#')) {
      ctx.globalAlpha = pa;
      ctx.fillStyle = pp.color;
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  
  drawAttackEffect(timestamp);
  drawSpecialEffect(timestamp);

  
  if (state.flashTimer > 0) {
    ctx.fillStyle = 'rgba(255,200,100,' + (state.flashTimer * 0.4) + ')';
    ctx.fillRect(-W, -H, W*3, H*3);
  }

  
  if (state.phaseShiftTimer > 0 && state.phaseShiftTimer > 1) {
    var psa = Math.min(1, (state.phaseShiftTimer - 1) * 0.5);
    ctx.fillStyle = 'rgba(10,5,30,' + psa * 0.5 + ')';
    ctx.fillRect(-W, -H, W*3, H*3);
  }

  ctx.restore(); 

  
  drawTitle(timestamp);
  drawHPBar(state.hp, getPhase(state.hp), timestamp);
  drawCombatLog();
  drawVoteScreen(timestamp);
  drawAnnouncement(timestamp);
  drawTagline();

  
  ctx.save();
  var camCX2 = W * 0.5, camCY2 = H * 0.45;
  ctx.translate(camCX2, camCY2);
  ctx.scale(state.cam.zoom, state.cam.zoom);
  ctx.translate(-camCX2 - state.cam.panX, -camCY2 - state.cam.panY);
  drawSpeechBubbles(timestamp);
  ctx.restore();

  
  drawEntranceOverlay(timestamp);

  } catch (e) {
    console.error('gameLoop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

    p.then(function() { demoPlaying = true; demoUpdateUI(); })
     .catch(function() { demoPlaying = false; demoUpdateUI(); });

  demoPlaying = false;
